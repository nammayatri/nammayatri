# yaml-language-server: $schema=./_schema.json
name: ny-rn-provider
title: NY Driver App (Android)
icon: assets/icons/mobile.svg
category: mobile
tags: [react-native, android, driver]

source:
  url: https://github.com/nammayatri/ny-react-native
  ref: main
  destDir: data/ny-react-native

ports:
  - { name: metro,   port: 8083, protocol: tcp,  allowOverride: true }
  - { name: backend, port: 8016, protocol: http }
  - { name: grpc,    port: 50051, protocol: tcp }
  - { name: mock,    port: 8080, protocol: http }

adbReverse: [metro, backend, grpc, mock]

tools: [node22, java17, yarn, adb]

inputs:
  - key: GOOGLE_SERVICES_JSON
    label: Firebase google-services.json
    type: file
    accept: [".json"]
    storeAs: path
    required: true
  - key: VARIANT
    label: App variant
    type: select
    options: [nammaYatri, jatriSaathi, bridge, manaYatri, yatri, lynx, bharatTaxi]
    default: lynx
  - key: APP_ID
    label: Android package id
    type: text
    default: "in.mobility.lynxdriver.debug"
  - key: CAC_CONFIG_URL
    label: CAC config URL
    type: text
    default: "http://localhost:8080/cac/provider"
    required: true
  - key: MERCHANT_ID_DRIVER
    label: Driver merchant ID
    type: text
    default: "a7f3c8e2-4b5d-4c9a-8f6e-2d1a3b4c5d6e"
    required: true
  - key: MOENGAGE_APP_ID
    label: MoEngage app ID
    type: text
    default: "MOENGAGE_DUMMY_APP_ID_0000000000"
    required: false

stages:
  - id: sync-source
    builtin: source
    lifecycle: one-shot
    invalidatedBy: [source.ref]

  - id: materialize
    needs: [sync-source]
    cwd: provider
    run: |
      set -e
      variant="${inputs.VARIANT}"
      variant_lc=$(printf '%s' "$variant" | tr '[:upper:]' '[:lower:]')
      mkdir -p "android/app/src/$variant"
      cp "${inputs.GOOGLE_SERVICES_JSON}" "android/app/src/$variant/google-services.json"
      if [ -f configs.zip ]; then unzip -o configs.zip; fi
      mkdir -p "configs/master/android/$variant"
      cp "configs/master/android/nammaYatri/.env"             "configs/master/android/$variant/.env"             2>/dev/null || true
      cp "configs/master/android/nammaYatri/local.properties" "configs/master/android/$variant/local.properties" 2>/dev/null || true
      cp "${inputs.GOOGLE_SERVICES_JSON}" "configs/master/android/$variant/google-services.json"
      env_file="configs/master/android/$variant/.env"
      touch "$env_file"
      upsert_env() {
        local key="$1" value="$2" tmp
        tmp=$(mktemp)
        grep -v "^$key=" "$env_file" > "$tmp" || true
        printf '%s=%s\n' "$key" "$value" >> "$tmp"
        mv "$tmp" "$env_file"
      }
      upsert_env UI_BASE_URL          "http://localhost:${ports.backend}/ui"
      upsert_env CUSTOMER_UI_BASE_URL "http://localhost:8013/v2"
      upsert_env CAC_CONFIG_URL       "${inputs.CAC_CONFIG_URL}"
      upsert_env MERCHANT_ID_DRIVER   "${inputs.MERCHANT_ID_DRIVER}"
      upsert_env MOENGAGE_APP_ID      "${inputs.MOENGAGE_APP_ID}"
      rm -f "$env_file.bak"
      echo "materialized for variant=$variant (lc=$variant_lc); env keys upserted (others preserved)"
    lifecycle: one-shot
    invalidatedBy:
      - inputs.GOOGLE_SERVICES_JSON
      - inputs.VARIANT
      - inputs.CAC_CONFIG_URL
      - inputs.MERCHANT_ID_DRIVER
      - inputs.MOENGAGE_APP_ID
      - ports.backend

  - id: install
    needs: [sync-source]
    cwd: provider
    run: "yarn install"
    lifecycle: one-shot
    invalidatedBy: [provider/package.json, provider/yarn.lock]

  - id: metro
    needs: [install]
    cwd: provider
    run: "yarn start --port ${ports.metro}"
    lifecycle: long-running
    readyProbe: { kind: log, pattern: "Welcome to Metro" }

  - id: build-android
    needs: [install, materialize]
    cwd: provider/android
    run: "./gradlew app:installLynxMasterDebug -PreactNativeDevServerPort=${ports.metro}"
    lifecycle: one-shot
    invalidatedBy: ["provider/android/**", "*.gradle"]

  - id: set-devhost
    needs: [metro]
    run: |
      set -euo pipefail
      PKG="${inputs.APP_ID}"
      HOSTPORT="localhost:${ports.metro}"
      PREF_PATH="shared_prefs/${PKG}_preferences.xml"

      echo "waiting for an adb device to come online (up to 5 min)…"
      deadline=$(( $(date +%s) + 300 ))
      while :; do
        if adb get-state 1>/dev/null 2>&1; then
          echo "device online: $(adb devices | sed -n '2p')"
          break
        fi
        if [ "$(date +%s)" -ge "$deadline" ]; then
          echo "✗ no adb device after 5 min — is an emulator/phone connected?" >&2
          exit 1
        fi
        sleep 2
      done
      adb wait-for-device
      until adb shell pm path "$PKG" 1>/dev/null 2>&1; do
        echo "waiting for $PKG to be installed on device…"
        sleep 2
        if [ "$(date +%s)" -ge "$deadline" ]; then
          echo "✗ $PKG not installed on device — run build-android first" >&2
          exit 1
        fi
      done

      EXISTING=$(adb shell run-as "$PKG" cat "$PREF_PATH" 2>/dev/null || true)
      if [ -z "$EXISTING" ] || ! echo "$EXISTING" | grep -q "<map>"; then
        EXISTING=$'<?xml version=\'1.0\' encoding=\'utf-8\' standalone=\'yes\' ?>\n<map>\n</map>'
      fi
      UPDATED=$(printf '%s\n' "$EXISTING" \
        | sed -E "/<string name=\"debug_http_host\">[^<]*<\/string>/d" \
        | sed -E "s|</map>|    <string name=\"debug_http_host\">${HOSTPORT}</string>\n</map>|")

      TMP=$(mktemp)
      printf '%s\n' "$UPDATED" > "$TMP"
      adb shell am force-stop "$PKG"
      adb shell run-as "$PKG" sh -c "'cat > ${PREF_PATH}'" < "$TMP"
      adb shell run-as "$PKG" cat "$PREF_PATH"
      adb shell monkey -p "$PKG" -c android.intent.category.LAUNCHER 1 >/dev/null
      rm -f "$TMP"
      echo "✓ $PKG → $HOSTPORT (launched)"
    lifecycle: one-shot

workflows:
  first-run:
    description: >-
      End-to-end bring-up of the provider (driver) app: clone/update the repo,
      materialize env + native config, install JS deps, start Metro, then
      build & install the Android variant on the running emulator/device.
    stages: [sync-source, materialize, install, metro, build-android]

  refresh-js:
    description: >-
      Restart only Metro (JS bundler). Use this when you've edited JS/TS code
      and want to reload the bundle without rebuilding native code.
    stages: [metro]

  refresh-native:
    description: >-
      Rebuild + reinstall the Android APK and (re)start Metro. Use this after
      editing native Android sources, gradle config, or adding new native deps.
    stages: [build-android, metro]

  reinstall:
    description: >-
      Reinstall JS deps, restart Metro, and rebuild the APK. Use after
      package.json/yarn.lock changes or when node_modules looks broken.
    stages: [install, metro, build-android]

logs:
  - { name: metro,  kind: stage, stage: metro }
  - { name: build,  kind: stage, stage: build-android }
  - { name: logcat, kind: cmd,   cmd: "adb logcat -s ReactNativeJS:V ReactNative:V" }

hooks:
  preStart:
    - cmd: "lsof -ti :${ports.metro} | xargs -r kill -9"
      stages: [metro]
