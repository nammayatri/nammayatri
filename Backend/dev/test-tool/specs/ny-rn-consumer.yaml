# yaml-language-server: $schema=./_schema.json
name: ny-rn-consumer
title: NY Consumer App (Android)
icon: assets/icons/mobile.svg
category: mobile
tags: [react-native, android, consumer]

source:
  url: https://github.com/nammayatri/ny-react-native
  ref: main
  destDir: data/ny-react-native

ports:
  - { name: metro,   port: 8082, protocol: tcp,  allowOverride: true }
  - { name: backend, port: 8013, protocol: http }
  - { name: mock,    port: 8080, protocol: http }

adbReverse: [metro, backend, mock]

tools: [node22, java17, yarn, adb]

inputs:
  - key: GOOGLE_SERVICES_JSON
    label: Firebase google-services.json
    type: file
    accept: [".json"]
    storeAs: path
    required: false
  - key: VARIANT
    label: App variant
    type: select
    options: [Bridge, NammaYatri, Yatri, ManaYatri, YatriSathi, Lynx, BharatTaxi]
    default: Lynx
    required: true
  - key: APP_ID
    label: Android package id
    type: text
    default: "in.mobility.international.debug"
    required: true
  - key: CLIENT_ID
    label: Client ID (local.properties)
    type: text
    default: "nammayatribap"
    required: true

stages:
  - id: sync-source
    builtin: source
    lifecycle: one-shot
    invalidatedBy: [source.ref]

  - id: materialize
    needs: [sync-source]
    run: |
      set -e
      variant_dir=$(printf '%s' "${inputs.VARIANT}" | tr '[:upper:]' '[:lower:]')
      target="consumer/android/app/${variant_dir}"
      mkdir -p "$target"
      cp "${inputs.GOOGLE_SERVICES_JSON}" "$target/google-services.json"
      echo "google-services.json → $target/google-services.json"

      mkdir -p consumer/env
      {
        printf 'BASE_URL="http://localhost:%s/v2"\n' "${ports.backend}"
        printf 'CAC_CONFIG_URL="http://localhost:%s/cac/consumer"\n' "${ports.mock}"
      } > consumer/env/.env.development

      props="consumer/android/local.properties"
      touch "$props"
      tmp=$(mktemp)
      grep -v '^CLIENT_ID=' "$props" > "$tmp" || true
      printf 'CLIENT_ID=%s\n' "${inputs.CLIENT_ID}" >> "$tmp"
      mv "$tmp" "$props"
      echo "CLIENT_ID=${inputs.CLIENT_ID} → local.properties"
    lifecycle: one-shot
    invalidatedBy: [inputs.GOOGLE_SERVICES_JSON, inputs.VARIANT, inputs.CLIENT_ID, ports.backend, ports.mock]

  - id: install
    needs: [sync-source]
    cwd: consumer
    run: "yarn install"
    lifecycle: one-shot
    invalidatedBy: [consumer/package.json, consumer/yarn.lock]

  - id: re-watch
    needs: [install]
    cwd: consumer
    run: "yarn re:start"
    lifecycle: long-running
    readyProbe: { kind: log, pattern: "watching" }

  - id: metro
    needs: [install]
    cwd: consumer
    run: "yarn start --port ${ports.metro}"
    lifecycle: long-running
    readyProbe: { kind: log, pattern: "Welcome to Metro" }

  - id: build-android
    needs: [install, materialize]
    cwd: consumer
    run: "yarn android:variant ${inputs.VARIANT}DevDebug --appId ${inputs.APP_ID}"
    lifecycle: one-shot
    invalidatedBy: ["consumer/android/**", "*.gradle"]

  - id: set-devhost
    needs: [metro]
    run: |
      set -euo pipefail
      PKG="${inputs.APP_ID}"
      HOSTPORT="localhost:${ports.metro}"
      PREF_PATH="shared_prefs/${PKG}_preferences.xml"

      echo "waiting for an adb device to come online (up to 5 min)…"
      deadline=$(( $(date +%s) + 300 ))
      while :; do
        if adb get-state 1>/dev/null 2>&1; then
          echo "device online: $(adb devices | sed -n '2p')"
          break
        fi
        if [ "$(date +%s)" -ge "$deadline" ]; then
          echo "✗ no adb device after 5 min — is an emulator/phone connected?" >&2
          exit 1
        fi
        sleep 2
      done
      adb wait-for-device
      # Ensure the app is actually installed before we try to run-as it.
      until adb shell pm path "$PKG" 1>/dev/null 2>&1; do
        echo "waiting for $PKG to be installed on device…"
        sleep 2
        if [ "$(date +%s)" -ge "$deadline" ]; then
          echo "✗ $PKG not installed on device — run build-android first" >&2
          exit 1
        fi
      done

      EXISTING=$(adb shell run-as "$PKG" cat "$PREF_PATH" 2>/dev/null || true)
      if [ -z "$EXISTING" ] || ! echo "$EXISTING" | grep -q "<map>"; then
        EXISTING=$'<?xml version=\'1.0\' encoding=\'utf-8\' standalone=\'yes\' ?>\n<map>\n</map>'
      fi
      UPDATED=$(printf '%s\n' "$EXISTING" \
        | sed -E "/<string name=\"debug_http_host\">[^<]*<\/string>/d" \
        | sed -E "s|</map>|    <string name=\"debug_http_host\">${HOSTPORT}</string>\n</map>|")

      TMP=$(mktemp)
      printf '%s\n' "$UPDATED" > "$TMP"
      adb shell am force-stop "$PKG"
      adb shell run-as "$PKG" sh -c "'cat > ${PREF_PATH}'" < "$TMP"
      adb shell run-as "$PKG" cat "$PREF_PATH"
      adb shell monkey -p "$PKG" -c android.intent.category.LAUNCHER 1 >/dev/null
      rm -f "$TMP"
      echo "✓ $PKG → $HOSTPORT (launched)"
    lifecycle: one-shot

workflows:
  first-run:      [sync-source, materialize, install, re-watch, metro, build-android, set-devhost]
  refresh-js:     [metro, set-devhost]
  refresh-native: [build-android, metro, set-devhost]
  reinstall:      [install, re-watch, metro, build-android, set-devhost]

logs:
  - { name: re-watch, kind: stage, stage: re-watch }
  - { name: metro,    kind: stage, stage: metro }
  - { name: build,    kind: stage, stage: build-android }
  - { name: logcat,   kind: cmd,   cmd: "adb logcat -s ReactNativeJS:V ReactNative:V" }

hooks:
  preStart:
    - "lsof -ti :${ports.metro} | xargs -r kill -9"
