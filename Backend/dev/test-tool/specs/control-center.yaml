# yaml-language-server: $schema=./_schema.json
name: control-center
title: Control Center
icon: assets/icons/control-center.svg
category: tool
tags: [node, vite, dashboard]

source:
  url: https://github.com/nammayatri/control-center
  ref: main
  destDir: data/control-center

ports:
  - { name: server,   port: 4001, protocol: http, allowOverride: true }
  - { name: frontend, port: 4002, protocol: http, allowOverride: true, openInBrowser: true }

tools: [node22]

domains:
  - { name: api, url: "http://localhost:4001" }
  - { name: ui,  url: "http://localhost:4002" }

inputs:
  - key: GOOGLE_PLAY_SERVICE_ACCOUNT_KEY
    label: Google Play service account
    type: file
    accept: [".json"]
    storeAs: env-inline
    required: false
  - key: APP_STORE_CONNECT_ACCOUNTS
    label: App Store Connect accounts
    type: file
    accept: [".json"]
    storeAs: env-inline
    required: false
  - key: OPENROUTER_API_KEY
    label: OpenRouter API key
    type: secret-text
    required: false
  - key: CLAUDE_WEB_PASSWORD
    label: Claude Web password
    type: secret-text
    required: false

env:
  PORT:                         "${ports.server}"
  VITE_API_URL:                 "http://localhost:8017"
  VITE_BAP_URL:                 "http://localhost:8017"
  VITE_BPP_URL:                 "http://localhost:8018"
  VITE_RIDER_APP_URL:           "http://localhost:8013"
  VITE_BACKEND_URL:             "http://localhost:${ports.server}"
  GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: "${inputs.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY}"
  APP_STORE_CONNECT_ACCOUNTS:      "${inputs.APP_STORE_CONNECT_ACCOUNTS}"
  OPENROUTER_API_KEY:              "${inputs.OPENROUTER_API_KEY}"
  CLAUDE_WEB_PASSWORD:             "${inputs.CLAUDE_WEB_PASSWORD}"

stages:
  - id: sync-source
    builtin: source
    lifecycle: one-shot
    invalidatedBy: [source.ref]

  - id: server-install
    needs: [sync-source]
    cwd: server
    run: "npm install"
    lifecycle: one-shot
    invalidatedBy: [server/package.json, server/package-lock.json]

  - id: frontend-install
    needs: [sync-source]
    run: "npm install"
    lifecycle: one-shot
    invalidatedBy: [package.json, package-lock.json]

  - id: server
    needs: [server-install]
    cwd: server
    run: "npm run dev"
    lifecycle: long-running
    readyProbe: { kind: http, url: "http://localhost:${ports.server}" }

  - id: frontend
    needs: [frontend-install]
    run: "npm run dev"
    lifecycle: long-running
    readyProbe: { kind: http, url: "http://localhost:${ports.frontend}" }

workflows:
  first-run:        [sync-source, server-install, frontend-install, server, frontend]
  refresh-server:   [server]
  refresh-frontend: [frontend]
  reinstall:        [server-install, frontend-install, server, frontend]

logs:
  - { name: server,   kind: stage, stage: server }
  - { name: frontend, kind: stage, stage: frontend }

hooks:
  preStart:
    - "lsof -ti :${ports.server}   | xargs -r kill -9"
    - "lsof -ti :${ports.frontend} | xargs -r kill -9"
