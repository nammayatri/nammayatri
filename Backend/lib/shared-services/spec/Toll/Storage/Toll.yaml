imports: {}

Toll:
  tableName: toll
  derives: "Generic,Show,Read,FromJSON,ToJSON"
  fields:
    id : Id Toll
    name: Text
    tollStartGates : "[TollGate]"
    tollEndGates : "[TollGate]"
    isAutoRickshawAllowed : Bool
    isTwoWheelerAllowed : Maybe Bool
    isAutoRickshawTollChargeApplicable : Maybe Bool
    isTwoWheelerTollChargeApplicable : Maybe Bool
    price: Price


  sqlType:
    tollStartGates: text[]
    tollEndGates: text[]

  default:
    isAutoRickshawAllowed: 'false'
    isTwoWheelerAllowed: 'false'
    isAutoRickshawTollChargeApplicable: 'false'
    isTwoWheelerTollChargeApplicable: 'false'

  constraints:
    id: PrimaryKey

  beamFields:
    price:
      currency: Maybe Currency
      price: HighPrecMoney

  fromTType:
    price: Kernel.Types.Common.mkPrice currency price|E

  toTType:
    price: (.amount)|I
    currency: (Kernel.Prelude.Just . (.currency))|I

  queries:
    findAllTollsByMerchantOperatingCity:
      kvFunction: findAllWithKV
      where:
        eq: [merchantOperatingCityId]

  extraOperations:
    - EXTRA_QUERY_FILE

  defaultQueryTypeConstraint: "(Toll.Storage.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema
