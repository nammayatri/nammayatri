# Finance Kernel - Direct Tax Transaction Table (TDS)
# Namma-DSL YAML specification

imports:
  UTCTime: Kernel.Prelude
  HighPrecMoney: Kernel.Types.Common
  ActorType: Lib.Finance.Core.Types

DirectTaxTransaction:
  tableName: direct_tax_transaction
  derives: "Generic"

  types:
    TransactionType:
      enum: "RideFare,Subscription,Incentive,Cancellation,BuyerCommission,CreditNote,DebitNote,PGFee"
      derive: "ToParamSchema"

    TdsTreatment:
      enum: "Deducted,Reimbursed"
      derive: "ToParamSchema"

    TdsRateReason:
      enum: "PAN,PAN_AADHAR_LINKAGE,LDC_CERTIFICATE,NO_PAN"
      derive: "ToParamSchema"

  fields:
    id: Id DirectTaxTransaction
    transactionDate: UTCTime
    transactionType: TransactionType
    referenceId: Text
    grossAmount: HighPrecMoney
    tdsRate: Double
    tdsAmount: HighPrecMoney
    netAmountPaid: HighPrecMoney
    tdsTreatment: TdsTreatment
    counterpartyId: Text
    panOfParty: Maybe Text
    panType: Maybe Text
    tanOfDeductee: Maybe Text
    paymentDate: Maybe UTCTime
    invoiceNumber: Maybe Text
    merchantId: Text
    merchantOperatingCityId: Text
    createdAt: UTCTime
    tdsSection: Maybe Text
    tdsRateReason: Maybe TdsRateReason

    # --- Audit ---
    createdBy: Maybe ActorType                     # Who created this record
    createdById: Maybe Text                        # requestId for UNKNOWN/SYSTEM, jobId for JOB, personId for PERSON/DASHBOARD_PERSON
    updatedBy: Maybe ActorType                     # Who updated this record
    updatedById: Maybe Text                        # requestId for UNKNOWN/SYSTEM, jobId for JOB, personId for PERSON/DASHBOARD_PERSON

  constraints:
    id: PrimaryKey
    referenceId: "!SecondaryKey"
    invoiceNumber: "!SecondaryKey"
    counterpartyId: "!SecondaryKey"

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findByTransactionDate:
      kvFunction: findAllWithKV
      where: transactionDate

    findByReferenceId:
      kvFunction: findAllWithKV
      where: referenceId

    findByInvoiceNumber:
      kvFunction: findAllWithKV
      where: invoiceNumber

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema
