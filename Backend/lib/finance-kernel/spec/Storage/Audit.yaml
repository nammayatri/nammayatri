# Finance Kernel - Audit Entry Table
# Namma-DSL YAML specification
#
# NOTE: Audit entries are IMMUTABLE (append-only). The auto-generated
# updateByPrimaryKey is overridden in the Extra query file to throw an error.
# Do NOT add update/delete queries here. See LAW 2: Immutability of History.
# The updatedAt field is intentionally excluded -- audit records must not
# be updated after creation.

imports:
  UTCTime: Kernel.Prelude
  Value: Data.Aeson
  AuditAction: Kernel.Types.Finance.Audit
  AuditEntityType: Kernel.Types.Finance.Audit
  AuditActorType: Kernel.Types.Finance.Audit

AuditEntry:
  tableName: finance_audit_entry
  derives: "Generic"

  fields:
    id: Id AuditEntry
    entityType: AuditEntityType
    entityId: Text
    action: AuditAction
    actorType: AuditActorType
    actorId: Maybe Text
    previousState: Maybe Value
    newState: Maybe Value
    metadata: Maybe Value
    ipAddress: Maybe Text
    hashChain: Maybe Text
    merchantId: Text
    merchantOperatingCityId: Text
    createdAt: UTCTime

  constraints:
    id: PrimaryKey
    entityId: SecondaryKey

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findByEntity:
      kvFunction: findAllWithKV
      where:
        and: [entityType, entityId]

    findByActor:
      kvFunction: findAllWithKV
      where:
        and: [actorType, actorId]

    findByAction:
      kvFunction: findAllWithKV
      where:
        and: [entityType, action]

  extraOperations:
    - EXTRA_QUERY_FILE

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema