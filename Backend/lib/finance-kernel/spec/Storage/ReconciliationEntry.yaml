# Finance Kernel - Reconciliation Entry Table
# Individual reconciliation records per booking/subscription
# Row-level line item matching - NOT summed aggregate
# Namma-DSL YAML specification

imports:
  UTCTime: Kernel.Prelude
  HighPrecMoney: Kernel.Types.Common
  ReconciliationSummary: Lib.Finance.Domain.Types.ReconciliationSummary

ReconciliationEntry:
  tableName: finance_reconciliation_entry
  derives: "Generic"

  types:
    # Matches TypeScript FinanceComponent
    FinanceComponent:
      enum: "GROSS_RIDE_FARE, GST, USER_CANCELLATION, DRIVER_CANCELLATION, DRIVER_TAKE_HOME_EARNINGS, SUBSCRIPTION_PURCHASE, EXPIRY, PG_PAYMENT_SETTLEMENT, PG_PAYOUT_SETTLEMENT"
      derive: "ToParamSchema"

    # Matches TypeScript ReconStatus
    ReconciliationStatus:
      enum: "MATCHED, HIGHER_IN_TARGET, LOWER_IN_TARGET, MISSING_IN_TARGET, MISSING_IN_SOURCE"
      derive: "ToParamSchema"

    # Matches JSON bookingId field
    ReconciliationType:
      enum: "DSR_VS_LEDGER, DSR_VS_SUBSCRIPTION, DSSR_VS_SUBSCRIPTION, SUBSCRIPTION_PURCHASE_VS_SUBSCRIPTION_TRANSACTION, PG_PAYMENT_SETTLEMENT_VS_SUBSCRIPTION, PG_PAYOUT_SETTLEMENT_VS_PAYOUT_REQUEST"
      derive: "ToParamSchema"

    # Matches JSON mode field
    RideMode:
      enum: "ONLINE, CASH"
      derive: "ToParamSchema"

    # Matches JSON status field (booking status)
    RideStatus:
      enum: "COMPLETED, CANCELLED"
      derive: "ToParamSchema"

  fields:
    id: Id ReconciliationEntry
    summaryId: Id ReconciliationSummary
    reconciliationDate: UTCTime
    reconciliationType: ReconciliationType

    # Keys matching JSON output - all Maybe as they may be empty for some
    bookingId: Maybe Text  # matches JSON "bookingId" - booking.id / subscription.id / payout.id
    dcoId: Maybe Text  # matches JSON "dcoId" (driver/fleet owner ID) - driver.id / settlement.id
    status: Maybe RideStatus  # matches JSON "status" (COMPLETED/CANCELLED)
    mode: Maybe RideMode  # matches JSON "mode" (ONLINE/CASH)

    # Financial values matching JSON
    expectedDsrValue: HighPrecMoney  # matches JSON "expectedDsrValue"
    actualLedgerValue: HighPrecMoney  # matches JSON "actualLedgerValue"
    variance: HighPrecMoney  # matches JSON "variance"

    # Result matching JSON
    reconStatus: ReconciliationStatus  # matches JSON "reconStatus"
    mismatchReason: Maybe Text  # matches JSON "mismatchReason"
    timestamp: UTCTime  # matches JSON "timestamp"

    # Additional fields for detailed tracking
    financeComponent: Maybe FinanceComponent  # Which component (GROSS_RIDE_FARE, GST, etc.)

    # For PG Settlement reconciliation (Jobs 4 & 5)
    sourceId: Maybe Text  # subscription.id / payout_request.id
    targetId: Maybe Text  # settlement report row id (finance_reconciliation_entry.id)
    settlementId: Maybe Text  # PG settlement batch ID from pg_*_settlement_report.settlement_id
    settlementDate: Maybe UTCTime  # from settlement report
    transactionDate: Maybe UTCTime  # purchaseTimestamp / createdAt
    pgTransactionDate: Maybe UTCTime  # external PG txn date (transactionDate is internal)
    rrn: Maybe Text  # bank reference number
    utr: Maybe Text  # bank UTR (distinct from rrn)
    settlementMode: Maybe Text  # payment method
    pgOrderId: Maybe Text  # PG order id (external; not paymentOrderId)
    pgTxnId: Maybe Text  # PG transaction id
    paymentOrderId: Maybe Text  # internal payment_order.id (linked from subscription_purchase)
    subscriptionAmountExclGst: Maybe HighPrecMoney  # internal base excl. GST (breakdown of expectedDsrValue)
    gstOnSubscription: Maybe HighPrecMoney  # internal GST portion
    totalTransactionAmount: Maybe HighPrecMoney  # internal total incl. GST (= expectedDsrValue for External PG Settlement Report vs Internal PG Settlement Summary)

    # Subscription purchase snapshot at reconciliation time
    purchaseStatus: Maybe Text  # subscription_purchase.status at EOD job run
    planName: Maybe Text  # plan.name at EOD job run

    # For debugging - store raw values as JSON
    sourceDetails: Maybe Text
    targetDetails: Maybe Text
    merchantOperatingCityId: Maybe Text
    merchantId: Maybe Text
    createdAt: UTCTime
    updatedAt: UTCTime

  constraints:
    id: PrimaryKey
    summaryId: SecondaryKey
    bookingId: "!SecondaryKey"
    dcoId: "!SecondaryKey"
    reconStatus: "!SecondaryKey"

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findBySummaryId:
      kvFunction: findAllWithKV
      where: summaryId

    findByReconciliationStatus:
      kvFunction: findAllWithKV
      where: reconStatus

    findByDateAndType:
      kvFunction: findAllWithKV
      where:
        and: [reconciliationDate, reconciliationType]

    findExceptions:
      kvFunction: findAllWithKV
      where:
        and: [reconciliationDate, reconciliationType]

  default:
    bookingId: "''"
    dcoId: "''"
    status: "'COMPLETED'"
    mode: "'ONLINE'"

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema
