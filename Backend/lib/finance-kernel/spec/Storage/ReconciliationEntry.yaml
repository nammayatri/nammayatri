# Finance Kernel - Reconciliation Entry Table
# One row per (source record, chunk) — domain-neutral schema. The recipe
# framework in Lib.Finance.Reconciliation writes into this shape.
# Regenerate Beam + read-only queries after editing.
# Namma-DSL YAML specification

imports:
  UTCTime: Kernel.Prelude
  HighPrecMoney: Kernel.Types.Common
  ReconciliationSummary: Lib.Finance.Domain.Types.ReconciliationSummary
  # Recipe-neutral enums live in the framework module so both YAMLs and
  # the runner reference exactly one canonical set of constructors.
  Domain: Lib.Finance.Reconciliation.Types
  DataSource: Lib.Finance.Reconciliation.Types
  ReconciliationStatus: Lib.Finance.Reconciliation.Types
  Lifecycle: Lib.Finance.Reconciliation.Types

ReconciliationEntry:
  tableName: finance_reconciliation_entry
  derives: "Generic"

  fields:
    id: Id ReconciliationEntry
    summaryId: Id ReconciliationSummary

    # Flat (domain, source, target) — indexed for cheap read paths.
    domain: Domain
    source: DataSource
    target: DataSource

    # Start of the chunk this entry belongs to (== summary.reconciliationDate
    # for the group of entries that share a summary).
    reconciliationDate: UTCTime

    # Amounts + result of the individual comparison.
    expectedAmount: HighPrecMoney
    actualAmount: HighPrecMoney
    variance: HighPrecMoney
    reconStatus: ReconciliationStatus
    mismatchReason: Maybe Text

    # Generic entity handles — domain-neutral replacements for the ride-fare
    # vocabulary (booking_id / dco_id) the previous schema baked in.
    entityId: Maybe Text        # primary domain entity (driver_fee.id / stcl_membership.id / …)
    partyId: Maybe Text         # driver_id / owner_id / whoever
    sourceRecordId: Maybe Text  # source table row id
    targetRecordId: Maybe Text  # target table row id (null when MISSING_IN_TARGET)

    # Freeform finance sub-classifier (e.g. "PENNY_DROP", "CAPITAL_PAYMENT").
    # Text so recipes can add labels without a schema deploy; hoist to a
    # typed enum per-domain once patterns stabilise.
    component: Maybe Text

    # Per-domain extras persisted as JSON alongside the entry.
    entityMeta: Maybe Text  # stored as JSONB; parsed application-side

    # Group-level checkfields (populated only when the recipe uses
    # GroupByTargetKey and this entry belongs to a group).
    groupTargetKey: Maybe Text
    groupSourceTotal: Maybe HighPrecMoney
    groupTargetAmount: Maybe HighPrecMoney

    # PG / settlement context — populated only when target = PG_PAYMENT_SETTLEMENT.
    settlementId: Maybe Text
    settlementDate: Maybe UTCTime
    settlementMode: Maybe Text
    transactionDate: Maybe UTCTime
    rrn: Maybe Text

    # Scope + bookkeeping.
    merchantId: Maybe Text
    merchantOperatingCityId: Maybe Text
    timestamp: UTCTime
    createdAt: UTCTime
    updatedAt: UTCTime

    # Stable natural-key identifier that survives re-processing. Populated
    # by the runner as @srcId@ for source-derived entries and
    # @"tgt:" <> tgtId@ for orphan-target entries — always non-null so a
    # UNIQUE index over it dedupes both kinds. Distinct from @id@ (a UUID
    # PK) so external references don't need to change on upsert.
    entryKey: Text

    # First insertion time for this natural key. Preserved across upserts;
    # @updatedAt@ tracks the most recent write.
    firstSeenAt: UTCTime

    # Source state at classification time (@InFlight@ / @Settled@ /
    # @Cancelled@). Drives @open@: the sweep re-checks any entry whose
    # source could still change.
    sourceLifecycle: Lifecycle

    # Moment the entry transitioned from OPEN to CLOSED. Null while OPEN.
    resolvedAt: Maybe UTCTime

    # True while the entry still needs revisiting:
    #   sourceLifecycle == InFlight  OR  reconStatus /= MATCHED
    # The sweep only reads @open = true@ rows; the partial index below
    # keeps the working set proportional to outstanding work, not history.
    open: Bool

    # Why the entry stopped being open. NULL for entries that closed
    # naturally (reached MATCHED, or written closed on first pass);
    # "AGED_OUT" for entries the sweep force-closed after outliving
    # 'maxOpenAge'. The classifier's verdict in @reconStatus@ is never
    # overwritten — 'closeReason' is the only signal that automation
    # gave up on this entry rather than reaching a clean resolution.
    closeReason: Maybe Text

  constraints:
    id: PrimaryKey
    summaryId: SecondaryKey
    entityId: "!SecondaryKey"
    groupTargetKey: "!SecondaryKey"
    entryKey: "!SecondaryKey"

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findBySummaryId:
      kvFunction: findAllWithKV
      where: summaryId

    findByReconciliationStatus:
      kvFunction: findAllWithKV
      where: reconStatus

    findByEntityId:
      kvFunction: findAllWithKV
      where: entityId

    findByGroupTargetKey:
      kvFunction: findAllWithKV
      where: groupTargetKey

    findByDomainSourceTarget:
      kvFunction: findAllWithKV
      where:
        and: [domain, source, target]

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema
