# Finance Kernel - Indirect Tax Transaction Table
# Namma-DSL YAML specification

imports:
  UTCTime: Kernel.Prelude
  HighPrecMoney: Kernel.Types.Common
  ActorType: Lib.Finance.Core.Types

IndirectTaxTransaction:
  tableName: indirect_tax_transaction
  derives: "Generic"

  types:
    TransactionType:
      enum: "RideFare,Subscription,Incentive,Cancellation,BuyerCommission,CreditNote,DebitNote,PGFee"
      derive: "ToParamSchema"

    GstCreditType:
      enum: "Input,Output"
      derive: "ToParamSchema"

    SaleType:
      enum: "B2B,B2C"
      derive: "ToParamSchema"

  # NOTE: Mask sensitive values in indirectTaxToAuditValue (Invoice.Service)
  fields:
    id: Id IndirectTaxTransaction
    transactionDate: UTCTime
    transactionType: TransactionType
    referenceId: Text
    taxableValue: HighPrecMoney
    gstRate: Double
    cgstAmount: HighPrecMoney
    sgstAmount: HighPrecMoney
    igstAmount: HighPrecMoney
    totalGstAmount: HighPrecMoney
    gstCreditType: GstCreditType
    counterpartyId: Text
    gstinOfParty: Maybe Text # SENSITIVE
    saleType: Maybe SaleType
    invoiceNumber: Maybe Text
    creditOrDebitNoteNumber: Maybe Text
    sacCode: Maybe Text
    externalCharges: Maybe HighPrecMoney
    taxRate: Maybe Double
    taxCreditType: Maybe GstCreditType
    issuedToTaxNo: Maybe Text # SENSITIVE
    issuedByTaxNo: Maybe Text
    totalTaxAmount: Maybe HighPrecMoney
    merchantId: Text
    merchantOperatingCityId: Text
    createdAt: UTCTime

    # --- Audit ---
    createdBy: Maybe ActorType                     # Who created this record
    createdById: Maybe Text                        # requestId for UNKNOWN/SYSTEM, jobId for JOB, personId for PERSON/DASHBOARD_PERSON
    updatedBy: Maybe ActorType                     # Who updated this record
    updatedById: Maybe Text                        # requestId for UNKNOWN/SYSTEM, jobId for JOB, personId for PERSON/DASHBOARD_PERSON

  constraints:
    id: PrimaryKey
    invoiceNumber: "!SecondaryKey"
    referenceId: "!SecondaryKey"
    counterpartyId: "!SecondaryKey"
    transactionDate: "!SecondaryKey"

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findByTransactionDate:
      kvFunction: findAllWithKV
      where: transactionDate

    findByReferenceId:
      kvFunction: findAllWithKV
      where: referenceId

    findByInvoiceNumber:
      kvFunction: findAllWithKV
      where: invoiceNumber

  default:
    saleType: "'B2C'"

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema
