# Finance Kernel - State Machine Tables
# Namma-DSL YAML specification

imports:
  UTCTime: Kernel.Prelude
  Value: Data.Aeson
  PaymentState: Lib.Finance.Domain.Types.StateTransition
  PaymentEntityType: Lib.Finance.Domain.Types.StateTransition

StateTransition:
  tableName: finance_state_transition
  derives: "Generic"

  types:
    PaymentState:
      enum: "PENDING,AUTHORIZED,CAPTURED,SETTLED,FAILED,REFUNDED,CANCELLED,INITIATED,PROCESSING,CREDITED,AUTO_PAY_FAILED,RETRYING,CASH_PAID,CASH_PENDING"
      derive: "ToParamSchema"

    PaymentEvent:
      enum: "INITIATE,AUTHORIZE,CAPTURE,SETTLE,FAIL,REFUND,CANCEL,CREDIT,RETRY"
      derive: "ToParamSchema"

    PaymentEntityType:
      enum: "PaymentTransaction,PayoutRequest,Refunds"

  fields:
    id: Id StateTransition
    entityType: PaymentEntityType
    entityId: Text
    fromState: PaymentState
    toState: PaymentState
    event: PaymentEvent
    eventData: Maybe Value
    actorType: Text
    actorId: Maybe Text
    merchantId: Text
    merchantOperatingCityId: Text
    createdAt: UTCTime

  constraints:
    id: PrimaryKey
    entityId: SecondaryKey

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findByEntity:
      kvFunction: findAllWithKV
      where:
        and: [entityType, entityId]

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema

CurrentState:
  tableName: finance_current_state
  derives: "Generic"
  fields:
    entityType: PaymentEntityType
    entityId: Text
    currentState: PaymentState
    merchantId: Text
    merchantOperatingCityId: Text
    updatedAt: UTCTime

  constraints:
    entityId: PrimaryKey

  queries:
    findByEntity:
      kvFunction: findOneWithKV
      where:
        and: [entityType, entityId]

    updateState:
      kvFunction: updateWithKV
      params: [currentState, updatedAt]
      where:
        and: [entityType, entityId]

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema
