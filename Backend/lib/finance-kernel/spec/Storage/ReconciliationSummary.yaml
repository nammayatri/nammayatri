# Finance Kernel - Reconciliation Summary Table
# One row per chunk × (domain, source, target) × (merchant, opCity).
# Regenerate Beam + read-only queries after editing.
# Namma-DSL YAML specification

imports:
  UTCTime: Kernel.Prelude
  HighPrecMoney: Kernel.Types.Common
  # Domain / DataSource are shared with the entry table and the recipe
  # framework — the single source of truth is Lib.Finance.Reconciliation.Types.
  Domain: Lib.Finance.Reconciliation.Types
  DataSource: Lib.Finance.Reconciliation.Types

ReconciliationSummary:
  tableName: finance_reconciliation_summary
  derives: "Generic"

  types:
    JobStatus:
      enum: "COMPLETED, FAILED, IN_PROGRESS"
      derive: "ToParamSchema"

  fields:
    id: Id ReconciliationSummary

    # Flat (domain, source, target) — matches the entry-side shape.
    domain: Domain
    source: DataSource
    target: DataSource

    # Start of the chunk this summary aggregates.
    reconciliationDate: UTCTime

    # Row counts.
    totalRecords: Int
    matchedRecords: Int
    totalDiscrepancies: Int

    # Financial totals.
    sourceTotal: HighPrecMoney
    targetTotal: HighPrecMoney
    varianceAmount: HighPrecMoney
    disputeAmountTotal: HighPrecMoney  # sum (abs (source - target)) across entries

    matchRate: Text  # "99.9%"

    status: JobStatus
    errorMessage: Maybe Text

    # Scope.
    merchantId: Text
    merchantOperatingCityId: Text
    createdAt: UTCTime
    updatedAt: UTCTime

  constraints:
    id: PrimaryKey
    reconciliationDate: SecondaryKey

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findByChunk:
      kvFunction: findAllWithKV
      where:
        and: [domain, source, target, reconciliationDate, merchantId, merchantOperatingCityId]

    findByDomainSourceTarget:
      kvFunction: findAllWithKV
      where:
        and: [domain, source, target]

    findByMerchantId:
      kvFunction: findAllWithKV
      where: merchantId

    updateStatus:
      kvFunction: updateWithKV
      params: [status, updatedAt]
      where: id

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema
