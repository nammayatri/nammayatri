# Finance Kernel - SAP Journal Entry Table
# Stores SAP API response data for dashboard display

imports:
  UTCTime: Kernel.Prelude
  HighPrecMoney: Kernel.Types.Common
  Currency: Kernel.Types.Common
  ActorType: Lib.Finance.Core.Types

SapJournalEntry:
  tableName: sap_journal_entry
  derives: "Generic"

  types:
    TransactionType:
      enum: "SubscriptionPurchase, Order, Refund, Chargeback, RevenueRecognition"
      derive: "ToParamSchema"
    JournalEntryStatus:
      enum: "SUCCESS, FAILED"
      derive: "ToParamSchema"

  fields:
    id: Id SapJournalEntry
    belnr: Maybe Text                              # JV Number - Document number from SAP
    batchId: Text                                  # Batch ID - Generated by SmartRide
    blart: Text                                    # Document Type (BLART) - Payment/Refund
    transactionType: TransactionType               # Online subscription sale / PG Settlement / Revenue recognition / Refund / Chargeback
    description: Text                              # Header description
    budat: Text                                    # Posting Date - Date when SAP entry is successful
    bldat: Text                                    # Document Date - Date of transaction
    gjahr: Maybe Text                              # Fiscal Year
    totalDebitAmount: HighPrecMoney                # Total GL Debit Amount (sum of all debit items)
    totalCreditAmount: HighPrecMoney               # Total GL Credit Amount (sum of all credit items)
    currency: Currency
    transactionCount: Int                          # Number of transactions aggregated in this JV
    glNumber: Maybe [Text]                         # GL Number - GL codes (hkont)
    glName: Maybe [Text]                           # GL Name
    sapMessage: Maybe Text                         # SAP response message
    status: JournalEntryStatus                     # SUCCESS or FAILED
    periodStartTime: UTCTime
    periodEndTime: UTCTime
    rawResponse: Maybe Text                        # Full SAP XML response for audit
    merchantId: Text
    merchantOperatingCityId: Text
    createdAt: UTCTime
    updatedAt: UTCTime

    # --- Audit ---
    createdBy: ActorType                           # Who created this record
    createdById: Maybe Text                        # requestId for UNKNOWN/SYSTEM, jobId for JOB, personId for PERSON/DASHBOARD_PERSON
    updatedBy: ActorType                           # Who updated this record
    updatedById: Maybe Text                        # requestId for UNKNOWN/SYSTEM, jobId for JOB, personId for PERSON/DASHBOARD_PERSON

  sqlType:
    glNumber: "text[]"
    glName: "text[]"

  constraints:
    id: PrimaryKey
    batchId: "!SecondaryKey"
    transactionType: "!SecondaryKey"

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findByBelnr:
      kvFunction: findAllWithKV
      where: belnr

    findByBatchId:
      kvFunction: findAllWithKV
      where: batchId

  extraOperations:
    - EXTRA_QUERY_FILE

  default:
    transactionCount: "0"
    totalDebitAmount: "0"
    totalCreditAmount: "0"

  defaultQueryTypeConstraint: "(Lib.Finance.Storage.Beam.BeamFlow.BeamFlow m r)"
  beamInstance: MakeTableInstancesGenericSchema
