imports:
  OperationHub: Dashboard.Common
  AuthReq: Dashboard.ProviderPlatform.Management.DriverRegistration
  AuthRes: Dashboard.ProviderPlatform.Management.DriverRegistration
  APISuccessWithUnprocessedEntities: Dashboard.ProviderPlatform.Fleet.Driver
  FCMRecipientToken: Kernel.External.Notification.FCM.Types

module: Driver

apis:
  - GET: # FetchOperationHubRequests
      endpoint: /operator/fetch/hubRequests
      auth: ApiAuthV2
      query:
        - mbFrom: UTCTime
        - mbTo: UTCTime
        - mbStatus: RequestStatus
        - mbReqType: RequestType
        - mbLimit: Int
        - mbOffset: Int
        - mbDriverId: Text
        - mbMobileNumber: Text
        - mbOperationHubId: Id OperationHub
        - mbRegistrationNo: Text
      response:
        type: OperationHubReqResp

  - POST: # RespondOperationHubRequest
      endpoint: /operator/respond/hubRequest
      auth: ApiAuthV2
      request:
        type: RespondHubRequest
      response:
        type: APISuccess

  # following apis currently used only for Driver Cum Owner case
  - POST: # SendFleetJoiningOtpAPI
      endpoint: /operator/sendJoiningOtp
      auth: ApiAuthV2
      request:
        type: AuthReq
      response:
        type: AuthRes
      helperApi:
        - POST:
            endpoint: /operator/sendJoiningOtp
            auth: ApiAuthV2
            mandatoryQuery:
              - requestorId: Text
            request:
              type: AuthReq
            response:
              type: AuthRes

  - POST: # VerifyFleetJoiningOtpAPI
      endpoint: /operator/verifyJoiningOtp
      auth: ApiAuthV2
      query:
        - authId: Text
      request:
        type: VerifyOperatorJoiningOtpReq
      response:
        type: APISuccess
      helperApi:
        - POST:
            endpoint: /operator/verifyJoiningOtp
            auth: ApiAuthV2
            query:
              - authId: Text
            mandatoryQuery:
              - requestorId: Text
            request:
              type: VerifyOperatorJoiningOtpReq
            response:
              type: APISuccess

  - POST: # BulkUploadDriversForOperatorAPI
      endpoint: /operator/addDrivers
      auth: ApiAuthV2
      multipart:
        type: CreateDriversReq
      response:
        type: APISuccessWithUnprocessedEntities
      helperApi:
        - POST:
            endpoint: /operator/addDrivers
            auth: ApiAuthV2
            mandatoryQuery:
              - requestorId: Text
            multipart:
              type: CreateDriversReq
            response:
              type: APISuccessWithUnprocessedEntities

types:
  RequestStatus:
    enum: "PENDING,APPROVED,REJECTED"
    derive': "HttpInstance, ToJSON, FromJSON, Generic, ToSchema, Eq"
  RequestType:
    enum: "ONBOARDING_INSPECTION, REGULAR_INSPECTION"
    derive': "HttpInstance, ToJSON, FromJSON, Generic, ToSchema, Eq"
  OperationHubReqResp:
    - recordType: NewType
    - requests: [OperationHubDriverRequest]
  OperationHubDriverRequest:
    id: Text
    operationHubId: Id OperationHub
    driverId: Text
    registrationNo: Text
    requestType: RequestType
    requestStatus: RequestStatus
    requestTime: UTCTime
  RespondHubRequest:
    status: RequestStatus
    registrationNo: Text # FIXME hide secrets
    operationHubRequestId: Text
    operatorId: Text
    remarks: Text
    derive: "'HideSecrets"
  VerifyOperatorJoiningOtpReq:
    - mobileCountryCode: Text
    - mobileNumber: Text
    - otp: Text
    - deviceToken: Maybe FCMRecipientToken
    - derive: "'HideSecrets"
  CreateDriversReq:
    - file: FilePath
    - recordType: NewType
    - derive: "'HideSecrets"

extraOperations:
  - EXTRA_API_TYPES_FILE
