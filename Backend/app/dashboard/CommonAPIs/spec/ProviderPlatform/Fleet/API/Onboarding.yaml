imports:
  DashboardAccessType: API.Types.ProviderPlatform.Management.Endpoints.Account
  DocumentType: API.Types.ProviderPlatform.Management.Endpoints.DriverRegistration
  DLDetails: API.Types.ProviderPlatform.Management.Endpoints.DriverRegistration
  RCDetails: API.Types.ProviderPlatform.Management.Endpoints.DriverRegistration
  PanType: API.Types.ProviderPlatform.Management.Endpoints.DriverRegistration
  AddressDocumentType: Dashboard.Common.Driver
  IndianState: Kernel.Types.Beckn.Context
  Day: Data.Time
  BaseUrl: Kernel.Prelude
  VehicleCategory: Domain.Types.VehicleCategory # check this
  Driver: Dashboard.Common
  APISuccess: Kernel.Types.APISuccess
  DocsVerificationStatus: Dashboard.Common

module: Onboarding

apis:
  - GET:
      endpoint: /document/configs
      auth: ApiAuthV2
      query:
        - makeSelfieAadhaarPanMandatory: Bool
        - onlyVehicle: Bool
        - role: Role
        - documentOnboardingStage: DocumentOnboardingStage
        - documentSubGroup: DocumentSubGroup
      response:
        type: DocumentVerificationConfigList
      helperApi:
        - GET:
            endpoint: /document/configs/{fleetOwnerId}
            auth: ApiAuthV2
            params:
              fleetOwnerId: Text
            query:
              - makeSelfieAadhaarPanMandatory: Bool
              - onlyVehicle: Bool
              - role: Role
              - documentOnboardingStage: DocumentOnboardingStage
              - documentSubGroup: DocumentSubGroup
            response:
              type: DocumentVerificationConfigList
  - GET:
      endpoint: /register/status
      auth: ApiAuthV2
      query:
        - driverId: Id Driver
        - makeSelfieAadhaarPanMandatory: Bool
        - onboardingVehicleCategory: VehicleCategory
        - providePrefillDetails: Bool
        - onlyMandatoryDocs: Bool
        - docsVerificationStatus: DocsVerificationStatus
        - enableDocumentMetadata: Bool
      response:
        type: StatusRes
      helperApi:
        - GET:
            endpoint: /register/status/{fleetOwnerId}
            auth: ApiAuthV2
            params:
              fleetOwnerId: Text
            query:
              - driverId: Id Driver
              - makeSelfieAadhaarPanMandatory: Bool
              - onboardingVehicleCategory: VehicleCategory
              - providePrefillDetails: Bool
              - onlyMandatoryDocs: Bool
              - docsVerificationStatus: DocsVerificationStatus
              - enableDocumentMetadata: Bool
            response:
              type: StatusRes
  # Vehicle-only RC verify-status. Resolves the RC from registrationNo/rcId. Dashboard callers are already
  # merchant/city-scoped by ApiAuthV2, so the per-person RC-ownership gate is skipped here (it is enforced
  # only on the driver-app UI endpoint). No helperApi / fleetOwnerId needed.
  - GET:
      endpoint: /register/vehicleStatus
      auth: ApiAuthV2
      query:
        - registrationNo: Text
        - rcId: Text
        - enableDocumentMetadata: Bool
      response:
        type: RcVerifyStatusResp
  - POST:
      endpoint: /verify/{verifyType}
      auth: ApiAuthV2
      params:
        verifyType: VerifyType
      request:
        type: VerifyReq
      response:
        type: APISuccess
      helperApi:
        - POST:
            endpoint: /verify/{verifyType}
            auth: ApiAuthV2
            params:
              verifyType: VerifyType
            request:
              type: VerifyReq
            query:
                accessType: DashboardAccessType
                adminApprovalRequired: Bool
            response:
              type: VerifyDocumentRes

  - GET:
      endpoint: /vehicle/documents
      auth: ApiAuthV2
      query:
        - rcNo: Text
        - rcId: Text
        - enableDocumentMetadata: Bool
      response:
        type: VehicleDocumentStatusRes

  - GET:
      endpoint: /get/referralDetails
      auth: ApiAuthV2
      mandatoryQuery:
        - referralCode: Text
      response:
        type: ReferralInfoRes
      helperApi:
        - GET:
            endpoint: /get/referralDetails/{requestorId}
            auth: ApiAuthV2
            params:
              requestorId: Text
            mandatoryQuery:
              - referralCode: Text
            response:
              type: ReferralInfoRes
types:
  VerifyReq:
    driverId: Text
    imageId: Text
    optionalImageId: Maybe Text
    identifierNumber: Text
    identifierName: Maybe Text
  VerifyDocumentRes:
    - enableFleetOwner: Bool
    - recordType: NewType
  VerifyType:
    enum: "VERIFY_PAN,VERIFY_GST,VERIFY_AADHAAR,VERIFY_UDYAM"
    derive: "HttpInstance"
  Role:
    enum: "NORMAL_FLEET, BUSINESS_FLEET"
    derive: "HttpInstance"
  DocumentVerificationConfigList:
    fleet: Maybe [DocumentVerificationConfigAPIEntity]
    autos: Maybe [DocumentVerificationConfigAPIEntity]
    cabs: Maybe [DocumentVerificationConfigAPIEntity]
    bikes: Maybe [DocumentVerificationConfigAPIEntity]
    ambulances: Maybe [DocumentVerificationConfigAPIEntity]
    trucks: Maybe [DocumentVerificationConfigAPIEntity]
    bus: Maybe [DocumentVerificationConfigAPIEntity]
    boat: Maybe [DocumentVerificationConfigAPIEntity]
    toto: Maybe [DocumentVerificationConfigAPIEntity]
  DocumentVerificationConfigAPIEntity:
    documentType: DocumentType
    applicableTo: DocumentApplicableType
    documentFields: Maybe [FieldInfo]
    documentFlowGrouping: DocumentFlowGrouping
    documentOnboardingStage: Maybe DocumentOnboardingStage
    title: Text
    description: Maybe Text
    isMandatory: Bool
    isMandatoryForEnabling: Bool
    isDisabled: Bool
    disableWarning: Maybe Text
    isHidden: Bool
    dependencyDocumentType: '[DocumentType]'
    checkExtraction: Bool
    checkExpiry: Bool
    rcNumberPrefixList: '[Text]'
    filterForOldApks: Maybe Bool
    documentCategory: Maybe DocumentCategory
    documentSubGroup: Maybe DocumentSubGroup
    isReminderSupported: Maybe Bool
    isApprovalSupported: Maybe Bool
    rolesAllowedToUploadDocument: Maybe [DashboardAccessType]
  DocumentCategory:
    enum: "Driver,Vehicle,Permission,Training"
  DocumentSubGroup:
    enum: "INDIVIDUAL_LEGAL_STRUCTURE,LEGAL_ENTITY_STRUCTURE"
    derive: "HttpInstance"
  DocumentFlowGrouping:
    enum: "COMMON,STANDARD"
  DocumentOnboardingStage:
    enum: "DRIVER_ONBOARDING,VEHICLE_DETAILS,OPERATOR_PERMIT,TAX_AND_LEGAL,BANK_DETAILS"
    derive: "HttpInstance"
  FieldType:
    enum: "FieldText,FieldInt,FieldDouble,FieldDropdown,FieldImage"
  FieldInfo:
    name: Text
    _type: FieldType
    isMandatory: Bool
    regexValidation: Maybe Text
    description: Maybe Text
    placeholder: Maybe Text
    dropdownValues: Maybe [Text]
  DocumentApplicableType:
    enum: "FLEET,INDIVIDUAL,FLEET_AND_INDIVIDUAL"
  StatusRes:
    driverDocuments: [DocumentStatusItem]
    vehicleDocuments: [VehicleDocumentItem]
    enabled: Bool
    manualVerificationRequired: Maybe Bool
    driverLicenseDetails: Maybe [DLDetails]
    vehicleRegistrationCertificateDetails: Maybe [RCDetails]
  DocumentStatusItem:
    documentType: DocumentType
    verificationStatus: ResponseStatus
    verificationMessage: Maybe Text
    verificationUrl: Maybe BaseUrl
    s3Path: Maybe Text
    imageId: Maybe Text
    imageId2: Maybe Text
    expiryDate: Maybe UTCTime
    metadata: Maybe DocumentMetadata
  DocumentMetadata:
    enum: "DLMetadata DLDocumentMetadata | AadhaarMetadata AadhaarDocumentMetadata | PanMetadata PanDocumentMetadata | LocalAddressProofMetadata LocalAddressProofDocumentMetadata | GSTMetadata GSTDocumentMetadata | RCMetadata RCDocumentMetadata | VehiclePUCMetadata VehiclePUCDocumentMetadata | VehicleFitnessMetadata VehicleFitnessCertificateDocumentMetadata | VehicleInsuranceMetadata VehicleInsuranceDocumentMetadata | VehiclePermitMetadata VehiclePermitDocumentMetadata | UDYAMMetadata UDYAMDocumentMetadata | TANMetadata TANDocumentMetadata | LDCMetadata LDCDocumentMetadata | NomineeDetailsMetadata NomineeDetailsDocumentMetadata | BankingDetailsMetadata BankingDetailsDocumentMetadata"
  UDYAMDocumentMetadata:
    udyamNumber: Maybe Text
    tdsRate: Maybe Double
  TANDocumentMetadata:
    documentId: Text
    tdsRate: Maybe Double
  LDCDocumentMetadata:
    documentId: Text
    tdsRate: Maybe Double
  DLDocumentMetadata:
    driverLicenseNumber: Text
    driverDateOfBirth: Maybe UTCTime
    dateOfExpiry: UTCTime
  AadhaarDocumentMetadata:
    aadhaarNumber: Maybe Text
    nameOnCard: Maybe Text
    dateOfBirth: Maybe Text
    address: Maybe Text
  PanDocumentMetadata:
    panNumber: Text
    panDocType: Maybe PanType
    driverDob: Maybe UTCTime
  LocalAddressProofDocumentMetadata:
    state: Maybe IndianState
    proofDocumentType: Maybe AddressDocumentType
    address: Maybe Text
  NomineeDetailsDocumentMetadata:
    nomineeName: Maybe Text
    nomineeDob: Maybe Day
    nomineeRelationship: Maybe Text
  BankingDetailsDocumentMetadata:
    accountNumber: Maybe Text
    ifscCode: Maybe Text
    nameAtBank: Maybe Text
    upiId: Maybe Text
  GSTDocumentMetadata:
    gstNumber: Text
  RCDocumentMetadata:
    fitnessExpiry: UTCTime
    vehicleNumberPlate: Text
    vehicleVariant: Maybe Text
    vehicleManufacturer: Maybe Text
    vehicleModel: Maybe Text
    vehicleModelYear: Maybe Int
    vehicleColor: Maybe Text
  VehiclePUCDocumentMetadata:
    pucNumber: Maybe Text
    pucExpiry: UTCTime
  VehicleFitnessCertificateDocumentMetadata:
    fitnessExpiry: UTCTime
    applicationNumber: Text
    rcNumber: Text
  VehicleInsuranceDocumentMetadata:
    policyNumber: Text
    insuranceExpiry: UTCTime
    insuranceProvider: Text
    rcNumber: Text
  VehiclePermitDocumentMetadata:
    permitNumber: Text
    permitExpiry: UTCTime
    regionCovered: Text
    rcNumber: Text
  ResponseStatus:
    enum: "NO_DOC_AVAILABLE,PENDING,VALID,FAILED,INVALID,LIMIT_EXCEED,MANUAL_VERIFICATION_REQUIRED,UNAUTHORIZED,PULL_REQUIRED,CONSENT_DENIED"
  VehicleDocumentItem:
    registrationNo: Text
    userSelectedVehicleCategory: VehicleCategory
    verifiedVehicleCategory: Maybe VehicleCategory
    isVerified: Bool
    isActive: Bool
    isApproved: Bool
    vehicleModel: Maybe Text
    documents: [DocumentStatusItem]
    dateOfUpload: UTCTime
    s3Path: Maybe Text
    imageId: Maybe Text
    expiryDate: Maybe UTCTime
    docsVerificationStatus: Maybe DocsVerificationStatus
  VehicleDocumentStatusRes:
    vehicleDocument: Maybe VehicleDocumentItem
  ReferralInfoRes:
    personId: Id Driver
    name: Text
  RcVerifyStatusResp:
    registrationNo: Text
    verified: Bool
    approved: Maybe Bool
    documents: [DocumentStatusItem]
