imports:
  LatLong: Kernel.External.Maps.Types
  TimeBound: Kernel.Types.TimeBound

module: LiveMap

apis:
  - GET:
      endpoint: /drivers
      auth: ApiAuthV2
      response:
        type: MapDriverInfoRes

types:
  MapDriverInfoRes:
    - driverName: Text
    - driverStatus: Status
    - todaySummary: TodaySummary
    - position: LatLong
    - source: Text
    - destination: Text
    - routeDetails: RouteDetails
  Status:
    - enum: "TO_PICKUP, ON_TRIP, ONLINE, SILENT, OFFLINE"
  TodaySummary:
    - driverName: Text
    - tripStatus: Status
    - tripsCompletedCount: Int
    - earnings: Money
    - totalDistance: Meters
    - tripBalanceLeft: Int
    - tripsCancelled: Int
    - tripsPassed: Int
    - tripsScheduled: Int
    - onlineDuration: Seconds
    - mobileCountryCode: Text
    - mobileNumber: Text
  RouteDetails:
    - code: Text
    - shortName: Text
    - longName: Text
    - startPoint: LatLong
    - endPoint: LatLong
    - stops: [StopInfo]
    - waypoints: Maybe [LatLong]
    - timeBounds: Maybe TimeBound
    - derive: "'HideSecrets"
  StopInfo:
    - name: Text
    - code: Text
    - point: LatLong
    - derive: "'HideSecrets"