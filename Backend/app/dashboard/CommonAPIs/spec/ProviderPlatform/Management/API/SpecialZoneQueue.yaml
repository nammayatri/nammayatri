imports: {}

module: SpecialZoneQueue

apis:
  - POST:
      endpoint: /triggerNotify
      auth: ApiAuthV2
      request:
        type: TriggerSpecialZoneQueueNotifyReq
      response:
        type: APISuccess

  - GET:
      endpoint: /queueStats/{gateId}
      auth: ApiAuthV2
      params:
        gateId: Text
      response:
        type: SpecialZoneQueueStatsRes

  - POST:
      endpoint: /manualQueueAdd
      auth: ApiAuthV2
      request:
        type: ManualQueueAddReq
      response:
        type: APISuccess

  - POST:
      endpoint: /manualQueueRemove
      auth: ApiAuthV2
      request:
        type: ManualQueueRemoveReq
      response:
        type: APISuccess

  - GET:
      endpoint: /driverQueuePosition
      auth: ApiAuthV2
      mandatoryQuery:
        driverId: Text
        specialLocationId: Text
        vehicleType: Text
      response:
        type: DriverQueuePositionRes

  - GET:
      endpoint: /driverQueueHistory
      auth: ApiAuthV2
      mandatoryQuery:
        driverId: Text
      response:
        type: DriverQueueHistoryRes

types:
  TriggerSpecialZoneQueueNotifyReq:
    - gateId: Text
    - vehicleType: Text
    - driversToNotify: Int
    - forceNotifyDriverIds: Maybe [Text]
    - isDemandHigh: Maybe Bool
    - derive: "'HideSecrets"

  ManualQueueAddReq:
    - specialLocationId: Text
    - vehicleType: Text
    - driverId: Text
    - queuePosition: Int
    - derive: "'HideSecrets"

  ManualQueueRemoveReq:
    - specialLocationId: Text
    - vehicleType: Text
    - driverId: Text
    - derive: "'HideSecrets"

  QueueDriverDetail:
    - driverId: Text
    - lat: Double
    - lon: Double
    - queuePosition: Maybe Int
    - inPickupZone: Bool
    - acceptedQueueRequest: Bool
    - committedToPickup: Bool

  VehicleQueueStats:
    - vehicleType: Text
    - totalInQueue: Int
    - inPickupZone: Int
    - outsidePickupZone: Int
    - pendingDemand: Int
    - driversCommittedToPickup: Int
    - acceptedQueueRequests: Int
    - demandThreshold: Maybe Int
    - minDriverThreshold: Maybe Int
    - maxDriverThreshold: Maybe Int
    - drivers: "[QueueDriverDetail]"

  SpecialZoneQueueStatsRes:
    - gateId: Text
    - gateName: Text
    - specialLocationName: Text
    - canQueueUpOnGate: Bool
    - vehicleStats: "[VehicleQueueStats]"
    - totalDriversInQueue: Int
    - totalInPickupZone: Int
    - totalOutsidePickupZone: Int
    - totalPendingDemand: Int
    - totalDriversCommittedToPickup: Int
    - totalAcceptedQueueRequests: Int

  DriverQueuePositionRes:
    - queuePosition: Maybe Int
    - queueSize: Int

  QueueTrackingState:
    - specialLocationId: Text
    - vehicleType: Text
    - consecutiveExitPings: Int
    - lastRecordedRank: Int

  QueueHistoryEvent:
    - timestamp: Double
    - value: Text

  DriverQueueHistoryRes:
    - trackingState: Maybe QueueTrackingState
    - currentRank: Maybe Int
    - events: "[QueueHistoryEvent]"
