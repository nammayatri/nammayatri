imports:
  FileType: AWS.S3
  File: Dashboard.Common

module: MediaFileDocument

apis:
  - POST:
      endpoint: /uploadLink
      auth: ApiAuthV2
      request:
        type: UploadMediaFileDocumentReq
      response:
        type: MediaFileUploadLinkResp
      helperApi:
        - POST:
            endpoint: /uploadLink
            auth: ApiAuthV2
            request:
              type: UploadMediaFileDocumentReq
            mandatoryQuery:
              - requestorId: Text
            response:
              type: MediaFileUploadLinkResp
  - POST:
      endpoint: /confirm
      auth: ApiAuthV2
      request:
        type: ConfirmMediaFileReq
      response:
        type: ConfirmMediaFileResp
      helperApi:
        - POST:
            endpoint: /confirm
            auth: ApiAuthV2
            request:
              type: ConfirmMediaFileReq
            mandatoryQuery:
              - requestorId: Text
            response:
              type: ConfirmMediaFileResp
  # Delete a MediaFile (removes the S3 object and the row).
  - POST:
      endpoint: /delete
      auth: ApiAuthV2
      request:
        type: DeleteMediaFileReq
      response:
        type: APISuccess
      helperApi:
        - POST:
            endpoint: /delete
            auth: ApiAuthV2
            request:
              type: DeleteMediaFileReq
            mandatoryQuery:
              - requestorId: Text
            response:
              type: APISuccess
  # Resolve a MediaFile id to a presigned download URL.
  - GET:
      endpoint: /downloadLink
      auth: ApiAuthV2
      mandatoryQuery:
        - fileId: Text
      response:
        type: MediaFileDownloadResp
      helperApi:
        - GET:
            endpoint: /downloadLink
            auth: ApiAuthV2
            mandatoryQuery:
              - fileId: Text
              - requestorId: Text
            response:
              type: MediaFileDownloadResp

types:
  UploadMediaFileDocumentReq:
    - fileType: FileType
    - reqContentType: Text
    - derive: "'HideSecrets"
  MediaFileUploadLinkResp:
    - uploadUrl: Text
    - filePath: Text
    - fileId: Id File
  ConfirmMediaFileReq:
    - fileId: Text
    - derive: "'HideSecrets"
  ConfirmMediaFileResp:
    - fileId: Id File
  DeleteMediaFileReq:
    - fileId: Text
    - derive: "'HideSecrets"
  MediaFileDownloadResp:
    - url: Maybe Text
