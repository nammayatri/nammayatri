imports:
  FileType: AWS.S3
  UTCTime: Kernel.Prelude

module: KnowledgeCenter
apiPrefix: knowledgeCenter

apis:
  - GET:
      endpoint: /getDocument/{knowledgeCenterId}
      auth: ApiAuthV2
      params:
        knowledgeCenterId: Text
      response:
        type: GetKnowledgeCenterDocumentResp
      helperApi:
        - GET:
            endpoint: /getDocument/{knowledgeCenterId}
            auth: ApiAuthV2
            params:
              knowledgeCenterId: Text
            mandatoryQuery:
              - requestorId: Text
            response:
              type: GetKnowledgeCenterDocumentResp
  - GET:
      endpoint: /sop/list
      auth: ApiAuthV2
      query:
        sopType: Text
      response:
        type: KnowledgeCenterSopListResp
      helperApi:
        - GET:
            endpoint: /sop/list
            auth: ApiAuthV2
            mandatoryQuery:
              - requestorId: Text
            query:
              sopType: Text
            response:
              type: KnowledgeCenterSopListResp
  - POST:
      endpoint: /sop/upload
      auth: ApiAuthV2
      request:
        type: KnowledgeCenterUploadImageReq
      response:
        type: KnowledgeCenterUploadImageResp
      helperApi:
        - POST:
            endpoint: /sop/upload
            auth: ApiAuthV2
            request:
              type: KnowledgeCenterUploadImageReq
            mandatoryQuery:
              - requestorId: Text
            response:
              type: KnowledgeCenterUploadImageResp
  - PUT:
      endpoint: /sopType/rename
      auth: ApiAuthV2
      request:
        type: KnowledgeCenterRenameSopTypeReq
      response:
        type: APISuccess
      helperApi:
        - PUT:
            endpoint: /sopType/rename
            auth: ApiAuthV2
            request:
              type: KnowledgeCenterRenameSopTypeReq
            mandatoryQuery:
              - requestorId: Text
            response:
              type: APISuccess
  - DELETE:
      endpoint: /sop/document/{knowledgeCenterId}
      auth: ApiAuthV2
      params:
        knowledgeCenterId: Text
      response:
        type: APISuccess
      helperApi:
        - DELETE:
            endpoint: /sop/document/{knowledgeCenterId}
            auth: ApiAuthV2
            params:
              knowledgeCenterId: Text
            mandatoryQuery:
              - requestorId: Text
            response:
              type: APISuccess
  - DELETE:
      endpoint: /sopType
      auth: ApiAuthV2
      mandatoryQuery:
        - sopType: Text
      response:
        type: APISuccess
      helperApi:
        - DELETE:
            endpoint: /sopType
            auth: ApiAuthV2
            mandatoryQuery:
              - sopType: Text
              - requestorId: Text
            response:
              type: APISuccess

types:
  KnowledgeCenterDocumentItem:
    - knowledgeCenterId: Text
    - documentName: Text
  SopTypeDocumentsItem:
    - sopType: Text
    - documents: [KnowledgeCenterDocumentItem]
  KnowledgeCenterSopListResp:
    - sopTypeDocuments: [SopTypeDocumentsItem]
  GetKnowledgeCenterDocumentResp:
    - fileType: FileType
    - imageBase64: Maybe Text
    - viewLink: Maybe Text
    - documentName: Text
  KnowledgeCenterUploadImageReq:
    - sopType: Text
    - imageBase64: Maybe Text
    - documentName: Maybe Text
    - fileExtension: Maybe Text
  KnowledgeCenterUploadImageResp:
    - knowledgeCenterId: Maybe Text
  KnowledgeCenterRenameSopTypeReq:
    - oldSopType: Text
    - newSopType: Text

extraOperations:
  - EXTRA_API_TYPES_FILE
