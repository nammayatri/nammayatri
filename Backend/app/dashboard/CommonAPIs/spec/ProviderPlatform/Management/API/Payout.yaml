imports:
  PayoutRequest: Lib.Payment.Domain.Types.PayoutRequest
  PayoutRequestResp: Lib.Payment.API.Payout.Types
  PayoutCancelReq: Lib.Payment.API.Payout.Types
  PayoutCashUpdateReq: Lib.Payment.API.Payout.Types
  DeleteVpaReq: Lib.Payment.API.Payout.Types
  UpdateVpaReq: Lib.Payment.API.Payout.Types
  RefundRegAmountReq: Lib.Payment.API.Payout.Types
  PayoutSuccess: Lib.Payment.API.Payout.Types
  PayoutHistoryRes: Lib.Payment.API.Payout.Types
  EntityName: Lib.Payment.Domain.Types.Common
  VehicleCategory: Domain.Types.VehicleCategory
  Driver: Dashboard.Common
  Ride: Dashboard.Common
  Summary: Dashboard.Common
  LocalTime: Data.Time

importPackageOverrides:
  Lib.Payment.Domain.Types.PayoutRequest: payment
  Lib.Payment.API.Payout.Types: payment
  Lib.Payment.Domain.Types.Common: payment

module: Payout

apis:
  - GET:
      endpoint: /payout/history
      auth: ApiAuthV2
      query:
        limit: Int
        offset: Int
        driverId: Text
        driverPhoneNo: Text
        isFailedOnly: Bool
        from: UTCTime
        to: UTCTime
      response:
        type: PayoutHistoryRes

  - GET:
      endpoint: /payout/referral/history
      auth: ApiAuthV2
      query:
        limit: Int
        offset: Int
        areActivatedRidesOnly: Bool
        customerPhoneNo: Text
        driverPhoneNo: Text
        driverId: (Id Driver)
        from: UTCTime
        to: UTCTime
      response:
        type: PayoutReferralHistoryRes

  - GET:
      endpoint: /payout/{payoutRequestId}
      auth: ApiAuthV2
      params:
        payoutRequestId: Id PayoutRequest
      response:
        type: PayoutRequestResp

  - POST:
      endpoint: /payout/{payoutRequestId}/retry
      auth: ApiAuthV2
      params:
        payoutRequestId: Id PayoutRequest
      response:
        type: PayoutSuccess

  - POST:
      endpoint: /payout/{payoutRequestId}/cancel
      auth: ApiAuthV2
      params:
        payoutRequestId: Id PayoutRequest
      request:
        type: PayoutCancelReq
      response:
        type: PayoutSuccess

  - POST:
      endpoint: /payout/{payoutRequestId}/cash
      auth: ApiAuthV2
      params:
        payoutRequestId: Id PayoutRequest
      request:
        type: PayoutCashUpdateReq
      response:
        type: PayoutSuccess

  - POST:
      endpoint: /payout/vpa/delete
      auth: ApiAuthV2
      request:
        type: DeleteVpaReq
      response:
        type: PayoutSuccess

  - POST:
      endpoint: /payout/vpa/update
      auth: ApiAuthV2
      request:
        type: UpdateVpaReq
      response:
        type: PayoutSuccess

  - POST:
      endpoint: /payout/vpa/refundRegistration
      auth: ApiAuthV2
      request:
        type: RefundRegAmountReq
      response:
        type: PayoutSuccess

  - POST:
      endpoint: /payout/scheduledPayoutConfig/upsert
      auth: ApiAuthV2
      request:
        type: UpdateScheduledPayoutConfigReq
      response:
        type: APISuccess

types:
  PayoutReferralHistoryRes:
    - history: [ReferralHistoryItem]
    - summary: Summary
  ReferralHistoryItem:
    - referralDate: UTCTime
    - customerPhone: Maybe Text
    - riderDetailsId: Text
    - hasTakenValidActivatedRide: Bool
    - dateOfActivation: Maybe LocalTime
    - fraudFlaggedReason: Maybe PayoutFlagReason
    - rideId: Maybe (Id Ride)
    - driverId: Maybe (Id Driver)
    - isReviewed: Bool
  PayoutFlagReason:
    - enum: "ExceededMaxReferral,MinRideDistanceInvalid,MinPickupDistanceInvalid,CustomerExistAsDriver,MultipleDeviceIdExists,RideConstraintInvalid"
  UpdateScheduledPayoutConfigReq:
    - payoutCategory: EntityName
    - isEnabled: Maybe Bool
    - frequency: Maybe ScheduledPayoutFrequency
    - dayOfWeek: Maybe Int
    - dayOfMonth: Maybe Int
    - timeOfDay: Maybe Text
    - batchSize: Maybe Int
    - minimumPayoutAmount: Maybe HighPrecMoney
    - maxRetriesPerDriver: Maybe Int
    - vehicleCategory: Maybe VehicleCategory
    - remark: Maybe Text
    - orderType: Maybe Text
    - timeDiffFromUtc: Maybe Seconds
  ScheduledPayoutFrequency:
    - enum: "DAILY, WEEKLY, MONTHLY"
