imports:
  APISuccess: Kernel.Types.APISuccess
  Text: Data.Text
  VehicleInfo: Dashboard.Common
  VehicleRegistrationCertificate: Dashboard.Common.Driver

module: VehicleInfo

apis:
  - GET:
      endpoint: /list
      auth: ApiAuthV2
      response:
        type: "[VehicleInfoAPIEntity]"
  - PUT:
      endpoint: /update
      auth: ApiAuthV2
      request:
        type: UpdateVehicleInfoReq
      response:
        type: APISuccess

types:
  UpdateVehicleInfoReq:
    - recordType: NewType
    - newInfo: "[VehicleInfoAPIEntity]"
    - derive: "'HideSecrets"
  VehicleInfoAPIEntity:
    - id: Id VehicleInfo
    - rcId: Id VehicleRegistrationCertificate
    - questionName: Text
    - question: Text
    - answer: Text