imports:
  Person: Dashboard.Common
  Role: Dashboard.Common


module: Account

apis:
  - GET:
      endpoint: /fetchUnverifiedAccounts
      auth: ApiAuthV2
      query:
        - fromDate: UTCTime
        - toDate: UTCTime
        - mobileNumber: Text
        - status: FleetOwnerStatus
      response:
        type: "[PersonAPIEntity]"
  - POST:
      endpoint: /verifyAccount
      auth: ApiAuthV2
      request:
        type: VerifyAccountReq
      response:
        type: APISuccess


types:
  FleetOwnerStatus:
    - enum: Approved, Rejected
    - derive: Kernel.Prelude.ToParamSchema
  VerifyAccountReq:
    - status: FleetOwnerStatus
    - reason: Maybe Text
    - fleetOwnerId: Id Person
  PersonAPIEntity:
    - id: Id Person
    - firstName: Text
    - lastName: Text
    - roleId: Id Role
    - email: Text
    - mobileNumber: Text
    - mobileCountryCode: Text
  #  - dashboardAccessType: Maybe DRole.DashboardAccessType
    - createdAt: UTCTime
    - receiveNotification: Maybe Bool
    - updatedAt: UTCTime
    - verified: Maybe Bool
    - rejectionReason: Maybe Text
    - rejectedAt: Maybe UTCTime

