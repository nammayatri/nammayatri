imports:
  Person: Domain.Types.Person

importPackageOverrides:
  Domain.Types.Person: "lib-dashboard"

module: Account

apis:
  - GET:
      endpoint: /fetchUnverifiedAccounts
      auth: ApiAuthV2
      query:
        - fromDate: UTCTime
        - toDate: UTCTime
        - mobileNumber: Text
        - status: FleetOwnerStatus
      response:
        type: [Person]

types:
  FleetOwnerStatus:
    type: enum
    variants:
      - PENDING
      - REJECTED