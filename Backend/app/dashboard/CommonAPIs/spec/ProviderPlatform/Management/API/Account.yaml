imports:
  Person: Dashboard.Common
  Role: Dashboard.Common
  City: Kernel.Types.Beckn.City


module: Account

apis:
  - GET:
      endpoint: /fetchUnverifiedAccounts
      auth: ApiAuthV2
      query:
        - fromDate: UTCTime
        - toDate: UTCTime
        - mobileNumber: Text
        - status: FleetOwnerStatus
        - limit: Int
        - offset: Int
      response:
        type: "[PersonAPIEntity]"
  - POST:
      endpoint: /verifyAccount
      auth: ApiAuthV2
      request:
        type: VerifyAccountReq
      response:
        type: APISuccess
      helperApi:
        - POST:
            endpoint: /verifyAccount
            auth: ApiAuthV2
            request:
              type: FleetOwnerRegisterReq
            query:
              - fleetOwnerId: Id Person
              - requireAdminApprovalForFleetOnboarding: Bool
            response:
              type: APISuccess


types:
  FleetOwnerStatus:
    - enum: Approved, Rejected
    - derive: "Read, HttpInstance"
  VerifyAccountReq:
    - status: FleetOwnerStatus
    - reason: Maybe Text
    - fleetOwnerId: Id Person
    - derive: "'HideSecrets"
  PersonAPIEntity:
    - id: Id Person
    - firstName: Text
    - lastName: Text
    - roleAPIEntity: RoleAPIEntity
    - email: Maybe Text
    - mobileNumber: Text
    - mobileCountryCode: Text
    - dashboardAccessType: Maybe DashboardAccessType
    - createdAt: UTCTime
    - receiveNotification: Maybe Bool
    - updatedAt: UTCTime
    - verified: Maybe Bool
    - rejectionReason: Maybe Text
    - rejectedAt: Maybe UTCTime
  DashboardAccessType:
    - enum: DASHBOARD_USER, DASHBOARD_ADMIN, FLEET_OWNER, DASHBOARD_RELEASE_ADMIN, MERCHANT_ADMIN, RENTAL_FLEET_OWNER, MERCHANT_MAKER, MERCHANT_SERVER, DASHBOARD_OPERATOR
  RoleAPIEntity:
    - id: Id Role
    - name: Text
    - dashboardAccessType: DashboardAccessType
    - description: Text
  FleetOwnerRegisterReq:
    - firstName: Text
    - lastName: Text
    - mobileNumber: Text
    - mobileCountryCode: Text
    - merchantId: Text
    - email: Maybe Text
    - city: City
    - fleetType: Maybe FleetType
    - panNumber: Maybe Text
    - gstNumber: Maybe Text
    - panImageId1: Maybe Text
    - panImageId2: Maybe Text
    - gstCertificateImage: Maybe Text
  FleetType:
    - enum: RENTAL_FLEET, NORMAL_FLEET, BUSINESS_FLEET

