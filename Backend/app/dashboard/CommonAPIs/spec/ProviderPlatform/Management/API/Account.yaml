imports:
  Merchant: Domain.Types.Merchant

importPackageOverrides:
  Domain.Types.Merchant: "lib-dashboard"

module: Account

apis:
  - GET: # FetchUnverifiedMerchantsAPI
      endpoint: /fetchUnverifiedAccounts
      auth: ApiAuthV2
      query:
        - fromDate: UTCTime
        - toDate: UTCTime
        - mobileNumber: Text
        - status: Bool
      response:
        type: [Merchant]

types: {}
