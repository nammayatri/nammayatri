# 1. Subscription Purchase list – track subscription revenue and usage
# 2. Fleet Operator list – fleet operator master data and financials
# 3. Invoice list – invoice metadata and compliance
# All response fields Maybe so missing data does not break the API.

imports:
  Summary: Dashboard.Common
  Driver: Dashboard.Common
  SubscriptionPurchase: Dashboard.Common
  PaymentOrder: Dashboard.Common
  PGPaymentSettlementReport: Dashboard.Common
  InvoiceStatus: Lib.Finance.Domain.Types.Invoice
  InvoiceType: Lib.Finance.Domain.Types.Invoice
  ReconciliationType: Lib.Finance.Domain.Types.ReconciliationSummary
  Value: Data.Aeson

module: FinanceManagement

apis:
  # ----- Subscription Purchase -----
  - GET: # SubscriptionPurchaseListAPI
      endpoint: /subscriptionPurchase/list
      query:
        limit: Int
        offset: Int
        from: UTCTime
        to: UTCTime
        status: SubscriptionPurchaseStatus
        driverId: Id Driver
        fleetOwnerId: Text
        amountMin: HighPrecMoney
        amountMax: HighPrecMoney
        subscriptionId: Text
        serviceName: Text
      auth: ApiAuthV2
      response:
        type: SubscriptionPurchaseListRes


  # ----- Invoice -----
  - GET: # InvoiceListAPI
      endpoint: /finance/invoice/list
      query:
        limit: Int
        offset: Int
        invoiceId: Text
        invoiceNumber: Text
        from: UTCTime
        to: UTCTime
        invoiceType: InvoiceType
        status: InvoiceStatus
      auth: ApiAuthV2
      response:
        type: InvoiceListRes

  # ----- Reconciliation -----
  - GET: # ReconciliationAPI
      endpoint: /finance/reconciliation
      mandatoryQuery:
        reconciliationType: ReconciliationType
      query:
        fromDate: UTCTime
        toDate: UTCTime
        limit: Int
        offset: Int
      auth: ApiAuthV2
      response:
        type: ReconciliationRes


  # ----- Payment settlement list -----
  - GET: # PaymentSettlementListAPI
      endpoint: /finance/payment/settlement/list
      query:
        limit: Int
        offset: Int
        from: UTCTime
        to: UTCTime
        subscriptionPurchaseId: Id SubscriptionPurchase
        paymentOrderShortId: ShortId PaymentOrder
        settlementId: Id PGPaymentSettlementReport
        pgApprovalCode: Text
        settlementUtr: Text
        settlementFrom: UTCTime
        settlementTo: UTCTime
        pgGateway: PgGateway
        settlementAmountMin: HighPrecMoney
        settlementAmountMax: HighPrecMoney
      auth: ApiAuthV2
      response:
        type: PaymentSettlementListRes

  # ----- Payment gateway transaction list -----
  - GET: # PaymentGatewayTransactionListAPI
      endpoint: /finance/payment/gateway/transaction/list
      query:
        limit: Int
        offset: Int
        from: UTCTime
        to: UTCTime
        subscriptionId: Id SubscriptionPurchase
        paymentOrderId: ShortId PaymentOrder
        pgGateway: PgGateway
        paymentStatus: PaymentStatusFilter
        paymentMode: PaymentModeFilter
        txnAmountMin: HighPrecMoney
        txnAmountMax: HighPrecMoney
      auth: ApiAuthV2
      response:
        type: PaymentTransactionReportListRes

  # ----- Wallet ledger (balance + ledger entries combined) -----
  - GET: # WalletLedgerAPI
      endpoint: /finance/wallet/ledger
      query:
        - limit: Int
        - offset: Int
        - driverId: Text
        - fleetOperatorId: Text
        - from: UTCTime
        - to: UTCTime
        - sourceType: Text
      auth: ApiAuthV2
      response:
        type: WalletLedgerRes


  - POST: # ReconciliationTriggerAPI
      endpoint: /reconciliation/trigger
      auth: ApiAuthV2
      request:
        type: ReconciliationTriggerReq
      response:
        type: ReconciliationTriggerRes
      userActionType: ApiAuth DRIVER_OFFER_BPP_MANAGEMENT FINANCE RECONCILIATION_TRIGGER

types:
  SubscriptionPurchaseStatus:
    - enum: "SubscriptionPending, SubscriptionActive, SubscriptionExpired, SubscriptionFailed, SubscriptionExhausted"
    - derive: "HttpInstance"

  PgGateway:
    - enum: "Juspay, BillDesk"
    - derive: "HttpInstance"

  PaymentModeFilter:
    - enum: "UPI, Card, NetBanking, Wallet"
    - derive: "HttpInstance"

  PaymentStatusFilter:
    - enum: "Success, Failed, Pending"
    - derive: "HttpInstance"

  TransactionTypeFilter:
    - enum: "Order, Refund"
    - derive: "HttpInstance"

  # ----- Subscription Purchase -----
  SubscriptionPurchaseListRes:
    - totalItems: Int
    - summary: Summary
    - subscriptions: [SubscriptionPurchaseListItem]
  SubscriptionPurchaseListItem:
    - subscriptionPurchaseId: Maybe Text
    - purchasedAt: Maybe UTCTime
    - driverName: Maybe Text
    - fleetOwnerName: Maybe Text
    - driverPhoneNumber: Maybe Text
    - fleetOwnerPhoneNumber: Maybe Text
    - driverId: Maybe Text
    - fleetOwnerId: Maybe Text
    - status: Maybe Text
    - amount: Maybe HighPrecMoney
    - planName: Maybe Text
    - planType: Maybe Text
    - planAmount: Maybe HighPrecMoney
    - planRideCredits: Maybe HighPrecMoney
    - planStatus: Maybe Text
    - planValidityDays: Maybe Int
    - planGeography: Maybe Text
    - planVehicleCategory: Maybe Text
    - subscriptionStartDate: Maybe UTCTime
    - subscriptionEndDate: Maybe UTCTime
    - subscriptionStatus: Maybe Text
    - baseAmount: Maybe HighPrecMoney
    - discountAmount: Maybe HighPrecMoney
    - totalAmount: Maybe HighPrecMoney
    - grossSubscriptionAmount: Maybe HighPrecMoney
    - gstRate: Maybe Double
    - gstAmount: Maybe HighPrecMoney
    - totalSubscriptionAmount: Maybe HighPrecMoney
    - invoiceId: Maybe Text
    - totalEntitledValue: Maybe HighPrecMoney
    - utilizedValue: Maybe HighPrecMoney
    - remainingValue: Maybe HighPrecMoney
    - revenueRecognized: Maybe HighPrecMoney
    - linkedRides: [LinkedRideItem]
    - createdAt: Maybe UTCTime
    - updatedAt: Maybe UTCTime

  LinkedRideItem:
    - rideId: Text
    - bookingId: Text
    - rideCreatedAt: UTCTime
    - rideSubscriptionDebitAmount: HighPrecMoney

  # ----- Fleet Operator -----
  FleetOperatorListRes:
    - totalItems: Int
    - summary: Summary
    - fleetOperators: [FleetOperatorListItem]
  FleetOperatorListItem:
    - fleetOperatorId: Maybe Text
    - legalName: Maybe Text
    - pan: Maybe Text
    - gstin: Maybe Text
    - settlementPreference: Maybe Text
    - linkedDriverIds: [Text]
    - totalEarnings: Maybe HighPrecMoney
    - totalDeductions: Maybe HighPrecMoney
    - outstandingBalance: Maybe HighPrecMoney
    - payoutReference: Maybe Text
    - payoutAmount: Maybe HighPrecMoney
    - payoutStatus: Maybe Text
    - createdAt: Maybe UTCTime
    - updatedAt: Maybe UTCTime

  # ----- Invoice -----
  InvoiceListRes:
    - totalItems: Int
    - summary: Summary
    - invoices: [InvoiceListItem]
  InvoiceListItem:
    - invoiceId: Text
    - invoiceNumber: Text
    - invoiceType: InvoiceType
    - invoiceDate: UTCTime
    - invoiceStatus: InvoiceStatus
    - counterpartyType: Text
    - counterpartyId: Text
    - taxableValue: Maybe HighPrecMoney
    - gstRate: Maybe Double
    - gstAmount: Maybe HighPrecMoney
    - totalInvoiceValue: HighPrecMoney
    - tdsReference: Maybe Text
    - irn: Maybe Text
    - qrCode: Maybe Text
    - rideId: Maybe Text
    - subscriptionId: Maybe Text
    - cgstAmount: Maybe HighPrecMoney
    - sgstAmount: Maybe HighPrecMoney
    - supplierName: Maybe Text
    - supplierAddress: Maybe Text
    - supplierGstin: Maybe Text
    - issuedToName: Maybe Text
    - issuedToAddress: Maybe Text
    - issuedByName: Maybe Text
    - issuedByAddress: Maybe Text
    - gstinOfParty: Maybe Text
    - sacCode: Maybe Text
    - paymentMethod: Maybe Text
    - taxableValueOfServiceSupplied: Maybe HighPrecMoney
    - lineItems: Value
    - generatedAt: UTCTime

  # ----- Reconciliation -----
  ReconciliationRes:
    - summary: ReconciliationSummary
    - exceptions: [ReconciliationEntry]
    - completed: [ReconciliationEntry]
  ReconciliationTriggerReq:
    - fromDate: UTCTime
    - toDate: UTCTime
    - reconciliationType: Maybe Text
  ReconciliationTriggerRes:
    - success: Bool
    - message: Text
  ReconciliationSummary:
    - totalDiscrepancies: Int
    - matchedRecords: Int
    - matchRate: Text
    - sourceTotal: HighPrecMoney
    - targetTotal: HighPrecMoney
    - varianceAmount: HighPrecMoney
  ReconciliationEntry:
    - bookingId: Maybe Text
    - dcoId: Maybe Text
    - status: Maybe Text
    - mode: Maybe Text
    - expectedValue: Maybe HighPrecMoney
    - actualValue: Maybe HighPrecMoney
    - variance: Maybe HighPrecMoney
    - reconStatus: Maybe Text
    - mismatchReason: Maybe Text
    - timestamp: Maybe UTCTime
    - financeComponent: Maybe Text
    - sourceId: Maybe Text
    - targetId: Maybe Text
    - settlementId: Maybe Text
    - settlementDate: Maybe UTCTime
    - settlementMode: Maybe Text
    - transactionDate: Maybe UTCTime
    - rrn: Maybe Text

  # ----- Payout list -----
  PayoutListRes:
    - totalItems: Int
    - payouts: [PayoutListItem]
  PayoutListItem:
    - payoutReference: Maybe Text
    - payoutAmount: Maybe HighPrecMoney
    - payoutDate: Maybe UTCTime
    - payoutStatus: Maybe Text

  # ----- Payment settlement list -----
  PaymentSettlementListRes:
    - totalItems: Int
    - summary: Summary
    - settlements: [PaymentSettlementListItem]
  PaymentSettlementListItem:
    - subscriptionPurchaseId: Maybe Text
    - merchantRefNo: Maybe Text
    - merchantOperatingCityId: Maybe Text
    - pgApprovalCode: Maybe Text
    - pgOrderId: Maybe Text
    - transactionDateAndTime: Maybe UTCTime
    - transactionType: Maybe TransactionTypeFilter
    - chargedAmount: Maybe HighPrecMoney
    - paymentStatus: Maybe Text
    - pgFees: Maybe HighPrecMoney
    - gstOnPgFees: Maybe HighPrecMoney
    - netAmount: Maybe HighPrecMoney
    - merchantId: Maybe Text
    - paymentMode: Maybe Text
    - driverName: Maybe Text
    - driverMobileNo: Maybe Text
    - driverEmailId: Maybe Text
    - pgName: Maybe Text
    - chargebackAmount: Maybe HighPrecMoney
    - chargebackId: Maybe Text
    - chargebackReasonCode: Maybe Text
    - chargebackStatus: Maybe Text
    - representmentStatus: Maybe Text
    - settlementId: Maybe Text
    - settlementDate: Maybe UTCTime
    - settlementCycle: Maybe Text
    - settlementAmount: Maybe HighPrecMoney
    - utr: Maybe Text
    - settlementStatus: Maybe Text
    - rrnNo: Maybe Text
    - reconciliationStatus: Maybe Text
    - reconciliationDate: Maybe UTCTime
    - differenceAmount: Maybe HighPrecMoney

  # ----- Payment gateway transaction list -----
  PaymentTransactionReportListRes:
    - totalItems: Int
    - summary: Summary
    - transactions: [PaymentTransactionReportItem]
  PaymentTransactionReportItem:
    - gatewayTransactionId: Maybe Text
    - merchantOrderId: Maybe Text
    - referenceId: Maybe Text
    - correlationId: Maybe Text
    - parentTransactionId: Maybe Text
    - transactionType: Maybe TransactionTypeFilter
    - transactionStatus: Maybe Text
    - failureReason: Maybe Text
    - errorCode: Maybe Text
    - transactionInitiationDate: Maybe UTCTime
    - paymentPageOpenDate: Maybe UTCTime
    - paymentGatewayOpenDate: Maybe UTCTime
    - refundInitiationDate: Maybe UTCTime
    - refundCompletionDate: Maybe UTCTime
    - transactionAmountGross: Maybe HighPrecMoney
    - netAmount: Maybe HighPrecMoney
    - gatewayCharges: Maybe HighPrecMoney
    - gstOnCharges: Maybe HighPrecMoney
    - tdsAmount: Maybe HighPrecMoney
    - withholdingAmount: Maybe HighPrecMoney
    - refundAmount: Maybe HighPrecMoney
    - currency: Maybe Text
    - exchangeRate: Maybe Double
    - paymentMode: Maybe Text
    - paymentSubMode: Maybe Text
    - upiId: Maybe Text
    - upiAppName: Maybe Text
    - cardType: Maybe Text
    - cardNetwork: Maybe Text
    - maskedCardNumber: Maybe Text
    - issuerBank: Maybe Text
    - walletProvider: Maybe Text
    - payerType: Maybe Text
    - payerName: Maybe Text
    - payerId: Maybe Text
    - payerMobile: Maybe Text
    - payerEmail: Maybe Text
    - subscriptionId: Maybe Text
    - vehicleId: Maybe Text
    - fleetOwnerId: Maybe Text
    - city: Maybe Text
    - operatingLocation: Maybe Text
    - serviceType: Maybe Text
    - refundId: Maybe Text
    - refundReason: Maybe Text
    - refundMode: Maybe Text
    - refundStatus: Maybe Text
    - ipAddress: Maybe Text
    - pgName: Maybe Text
    - pgMerchantId: Maybe Text

  # ----- Wallet ledger (balance + ledger combined) -----
  WalletLedgerRes:
    - availableWalletBalance: Maybe HighPrecMoney
    - lockedWalletBalance: Maybe HighPrecMoney
    - lastWalletUpdatedAt: Maybe UTCTime
    - totalItems: Int
    - ledgerEntries: [WalletLedgerItem]
  WalletLedgerItem:
    - walletTxnId: Maybe Text
    - walletTxnDate: Maybe UTCTime
    - sourceType: Maybe Text
    - sourceReferenceId: Maybe Text
    - creditAmount: Maybe HighPrecMoney
    - debitAmount: Maybe HighPrecMoney
    - openingBalance: Maybe HighPrecMoney
    - closingBalance: Maybe HighPrecMoney

  # ----- Earnings Summary -----
  EarningsSummaryRes:
    - totalRideEarnings: HighPrecMoney
    - totalIncentives: HighPrecMoney
    - totalPenalties: HighPrecMoney
    - grossEarnings: HighPrecMoney
    - totalTdsDeducted: HighPrecMoney
    - totalGstDeducted: HighPrecMoney
    - netEarnings: HighPrecMoney

extraOperations:
  - EXTRA_API_TYPES_FILE
  - EXTRA_API_COMMON_TYPES_FILE
