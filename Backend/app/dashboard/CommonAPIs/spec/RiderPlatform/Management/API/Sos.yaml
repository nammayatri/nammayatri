imports:
  Sos: Dashboard.Common
  Customer: Dashboard.Common
  Ride: Dashboard.Common
  Merchant: Dashboard.Common
  MerchantOperatingCity: Dashboard.Common
  APISuccess: Kernel.Types.APISuccess
  UTCTime: Kernel.Prelude
  Integer: EulerHS.Prelude

module: Sos

apis:
  - GET:
      endpoint: /{sosId}/tracking
      name: GetSosTracking
      auth: NoAuth
      params:
        sosId: Id Sos
      response:
        type: SosTrackingRes

  - GET:
      endpoint: /{sosId}/details
      name: GetSosDetails
      auth: NoAuth
      params:
        sosId: Id Sos
      response:
        type: SosDetailsMaybeRes

  - POST:
      endpoint: /{sosId}/callExternalSOS
      name: PostSosCallExternalSOS
      auth: ApiAuthV2
      params:
        sosId: Id Sos
      response:
        type: APISuccess

  # POST /sos/erss/statusUpdate (Webhook for external SOS status update from Police)
  - POST:
      endpoint: /erss/statusUpdate
      auth: ApiAuthV2
      request:
        type: ErssStatusUpdateReq
      response:
        type: ErssStatusUpdateRes

types:
  SosLocationRes:
    - lat: Double
    - lon: Double
    - accuracy: Maybe Double

  SosState:
    - enum: LiveTracking, SosActive

  SosStatus:
    - enum: NotResolved, Pending, Resolved, MockPending, MockResolved

  SosType:
    - enum: Police, CustomerCare, SafetyFlow, CSAlertSosTicket, AudioRecording, KaptureDashboard

  SosEntityType:
    - enum: Ride, NonRide

  ExternalSOSTriggerSource:
    - enum: FRONTEND, DASHBOARD

  SosDetailsMaybeRes:
    - details: Maybe SosDetailsRes
    - triggerSource: Maybe ExternalSOSTriggerSource
    - riderDetails: Maybe RiderDetailsRes

  SosDetailsRes:
    - id: Id Sos
    - personId: Id Customer
    - rideId: Maybe (Id Ride)
    - flow: SosType
    - status: SosStatus
    - ticketId: Maybe Text
    - mediaFiles: "[Text]"
    - trackingExpiresAt: Maybe UTCTime
    - sosState: Maybe SosState
    - entityType: Maybe SosEntityType
    - externalReferenceId: Maybe Text
    - externalReferenceStatus: Maybe Text
    - externalStatusHistory: Maybe Text
    - merchantId: Maybe (Id Merchant)
    - merchantOperatingCityId: Maybe (Id MerchantOperatingCity)
    - createdAt: UTCTime
    - updatedAt: UTCTime

  SosTrackingRes:
    - currentLocation: Maybe SosLocationRes
    - sosState: Maybe SosState
    - status: SosStatus

  RiderDetailsRes:
    - firstName: Maybe Text
    - middleName: Maybe Text
    - lastName: Maybe Text

  ErssStatusUpdateReq:
    - idSource: Maybe Text
    - idErss: Text
    - currentStatus: Text
    - statusDesc: Maybe Text
    - comments: Maybe Text
    - lastUpdatedTime: Maybe Integer

  ErssStatusUpdateRes:
    - resultCode: Text
    - resultString: Maybe Text
    - errorMsg: Maybe Text
    - message: Maybe Text
    - payLoad: Maybe Text