imports:
  Customer: Dashboard.Common
  Summary: Dashboard.Common
  HighPrecMoney: Kernel.Types.Common
  PriceAPIEntity: Kernel.Types.Common

module: Customer

apis:
  - GET:
      endpoint: /list
      auth: ApiAuth APP_BACKEND_MANAGEMENT CUSTOMERS CUSTOMER_LIST
      query:
        - limit: Int
        - offset: Int
        - enabled: Bool
        - blocked: Bool
        - phone: Text
        - personId: Id Customer
      response:
        type: CustomerListRes
  - DELETE:
      endpoint:  /{customerId}/delete
      auth: ApiAuth APP_BACKEND_MANAGEMENT CUSTOMERS CUSTOMER_DELETE
      params:
        customerId: Id Customer
      response:
        type: APISuccess
      migrate:
        endpoint: CustomerAPI DeleteCustomerEndpoint
  - POST:
      endpoint:  /{customerId}/block
      auth: ApiAuth APP_BACKEND_MANAGEMENT CUSTOMERS CUSTOMER_BLOCK
      params:
        customerId: Id Customer
      response:
        type: APISuccess
      migrate:
        endpoint: CustomerAPI BlockCustomerEndpoint
  - POST:
      endpoint:  /{customerId}/unblock
      auth: ApiAuth APP_BACKEND_MANAGEMENT CUSTOMERS CUSTOMER_UNBLOCK
      params:
        customerId: Id Customer
      response:
        type: APISuccess
      migrate:
        endpoint: CustomerAPI UnblockCustomerEndpoint
  - GET:
      endpoint:  /{customerId}/info
      auth: ApiAuth APP_BACKEND_MANAGEMENT CUSTOMERS CUSTOMER_INFO
      params:
        customerId: Id Customer
      response:
        type: CustomerInfoRes
  - POST:
      endpoint: /{customerId}/cancellationDuesSync
      auth: ApiAuth APP_BACKEND_MANAGEMENT CUSTOMERS CUSTOMER_CANCELLATION_DUES_SYNC
      params:
        customerId: Id Customer
      request:
        type: CustomerCancellationDuesSyncReq
      response:
        type: APISuccess
      migrate:
        endpoint: CustomerAPI CancellationDuesSyncCustomerEndpoint


types:
  CustomerListRes:
    - totalItems: Int # for backward compatibility
    - summary: Summary
    - customers: [CustomerListItem]
  CustomerListItem:
    - customerId: Id Customer
    - firstName: Maybe Text
    - middleName: Maybe Text
    - lastName: Maybe Text
    - phoneNo: Maybe Text
    - enabled: Bool
    - blocked: Bool
  CustomerInfoRes:
    - numberOfRides: Int
    - falseSafetyAlarmCount: Int
    - safetyCenterDisabledOnDate: Maybe UTCTime
    - totalSosCount: Int
  CustomerCancellationDuesSyncReq:
    - cancellationCharges: Maybe HighPrecMoney
    - cancellationChargesWithCurrency: Maybe PriceAPIEntity
    - disputeChancesUsed: Maybe Int
    - paymentMadeToDriver: Bool

CustomerCancellationDuesSyncReq:
  - derive: "'HideSecrets"
