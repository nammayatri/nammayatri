imports:
  Text: Data.Text
  Person: Domain.Types.Person
  Ride: Domain.Types.Ride
  UTCTime: Kernel.Prelude
  APISuccess: Kernel.Types.APISuccess
  HighPrecMeters: Kernel.Types.Common
  InvoiceType: Lib.Finance.Domain.Types.Invoice
  DateOrTime: Lib.Finance.Invoice.PdfService

module: Invoice
types:
  FinanceInvoicePdfResp:
    pdfBase64: Text
    invoiceNumber: Text

  InvoiceRes:
    date: UTCTime
    rideStartTime: UTCTime
    rideEndTime: UTCTime
    totalAmount: Text
    shortRideId: Text
    driverName: Text
    vehicleNumber: Text
    source: Text
    destination: Text
    faresList: "[FareBreakup]"
    chargeableDistance: Maybe HighPrecMeters
    chargeableDistanceWithUnit: Maybe Distance

  FareBreakup:
    title: Text
    price: Text

apis:
  - GET: # FinanceInvoicePdfAPI
      endpoint: /finance/invoice/pdf
      auth: ApiAuthV2
      query:
        referenceId: Text
        invoiceType: InvoiceType
        from: DateOrTime
        to: DateOrTime
        limit: Int
        offset: Int
      response:
        type: FinanceInvoicePdfResp

  # GET /invoice
  - GET:
      endpoint: /invoice
      auth: ApiAuthV2 # TODO changed from APP_BACKEND to APP_BACKEND_MANAGEMENT, test access and url
      mandatoryQuery:
        from: UTCTime
        to: UTCTime
        phoneNumber: Text
      response:
        type: "[InvoiceRes]"
      migrate:
        userActionType: ApiAuth APP_BACKEND CUSTOMERS INVOICE