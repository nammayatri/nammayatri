imports:
  RefundRequest: Domain.Types.RefundRequest
  RefundRequestStatus: Domain.Types.RefundRequest
  Person: Domain.Types.Person
  PaymentOrder: Lib.Payment.Domain.Types.PaymentOrder
  Refunds: Lib.Payment.Domain.Types.Refunds
  Summary: Dashboard.Common
  RefundStatus: Kernel.External.Payment.Interface.Types
  RefundRequestCode: Domain.Types.RefundRequest
  RefundPurpose: Domain.Types.RefundRequest
  Ride: Domain.Types.Ride

importPackageOverrides:
  Domain.Types.Ride: "rider-app"
  Domain.Types.RefundRequest: "rider-app"
  Domain.Types.Person: "rider-app"
  Lib.Payment.Domain.Types.PaymentOrder: "payment"
  Lib.Payment.Domain.Types.Refunds: "payment"

module: Payment

apis:
  - GET:
      endpoint: refundRequest/list
      auth: ApiAuthV2
      query:
        - limit: Int
        - offset: Int
        - status: RefundRequestStatus
        - code: RefundRequestCode
        - customerId: Id Person
        - orderId: Id PaymentOrder
        - from: UTCTime
        - to: UTCTime
      response:
        type: RefundRequestResp
  - GET:
      endpoint: refundRequest/{refundRequestId}/info
      auth: ApiAuthV2
      params:
        refundRequestId: Id RefundRequest
      query:
        refreshRefunds: Bool
      response:
        type: RefundRequestInfoResp
  - POST:
      endpoint: refundRequest/{refundRequestId}/respond
      auth: ApiAuthV2
      params:
        refundRequestId: Id RefundRequest
      request:
        type: RefundRequestRespondReq
      response:
        type: RefundRequestRespondResp
  - POST:
      endpoint: refundRequest/{rideId}/initiate
      auth: ApiAuthV2
      params:
        rideId: Id Ride
      request:
        type: RefundRequestInitiateReq
      response:
        type: RefundRequestRespondResp

types:
  RefundRequestResp:
    - summary: Summary
    - refundRequests: [RefundRequestItem]
  RefundRequestItem:
    - id: Id RefundRequest
    - orderId: Id PaymentOrder
    - requestedAmount: Maybe PriceAPIEntity
    - transactionAmount: PriceAPIEntity
    - refundPurpose: RefundPurpose
    - status: RefundRequestStatus
    - code: RefundRequestCode
    - description: Text
    - responseDescription: Maybe Text
    - refundsId: Maybe (Id Refunds)
    - refundsAmount: Maybe PriceAPIEntity
    - refundsTries: Int
    - createdAt: UTCTime
    - updatedAt: UTCTime
  RefundRequestInfoResp:
    - orderId: Id PaymentOrder
    - requestedAmount: Maybe PriceAPIEntity
    - transactionAmount: PriceAPIEntity
    - refundPurpose: RefundPurpose
    - status: RefundRequestStatus
    - code: RefundRequestCode
    - description: Text
    - responseDescription: Maybe Text
    - refundsId: Maybe (Id Refunds)
    - refundsAmount: Maybe PriceAPIEntity
    - refundsTries: Int
    - evidence: Maybe Text
    - refundStatus: Maybe RefundStatus
    - errorCode: Maybe Text
    - createdAt: UTCTime
    - updatedAt: UTCTime
  RefundRequestRespondReq:
    - approve: Bool
    - responseDescription: Maybe Text
    - approvedAmount: Maybe PriceAPIEntity
    - retryRefunds: Maybe Bool # in case if previous refund was failed
    - deductFromDriver: Maybe Bool # required when approve=true; drives Stripe reverse_transfer
    - derive: "'HideSecrets"
  RefundRequestRespondResp:
    - status: RefundRequestStatus
    - refundStatus: Maybe RefundStatus
    - errorCode: Maybe Text
    - derive: "'HideSecrets"
  RefundRequestInitiateReq:
    - requestedAmount: Maybe PriceAPIEntity # null = full ride
    - description: Maybe Text               # admin notes; null = handler default
    - deductFromDriver: Maybe Bool          # drives Stripe reverse_transfer
    - derive: "'HideSecrets"
