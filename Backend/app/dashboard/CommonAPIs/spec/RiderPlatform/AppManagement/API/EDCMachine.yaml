imports:
  Text: Data.Text
  Bool: Data.Bool
  APISuccess: Kernel.Types.APISuccess
  Person: Domain.Types.Person
  EDCMachineMapping: Domain.Types.EDCMachineMapping

importPackageOverrides:
  Domain.Types.Person: "rider-app"
  Domain.Types.EDCMachineMapping: "rider-app"

module: EDCMachine
apiPrefix: edcMachine

types:
  AssignEDCMachineReq:
    personId: Id Person
    machineName: Maybe Text
    paytmMid: Text
    channelId: Text
    clientId: Text
    merchantKey: Text
    paytmTid: Text
    derive: "'HideSecrets"

  AssignEDCMachineResp:
    id: Id EDCMachineMapping
    personId: Id Person
    machineName: Maybe Text
    paytmTid: Text
    isActive: Bool

  EDCMachineMappingListItem:
    id: Id EDCMachineMapping
    personId: Id Person
    machineName: Maybe Text
    terminalId: Text
    isActive: Bool
    createdAt: UTCTime

  EDCMachineMappingListResp:
    mappings: "[EDCMachineMappingListItem]"

  UpdateEDCMachineReq:
    machineName: Maybe Text
    paytmMid: Maybe Text
    channelId: Maybe Text
    clientId: Maybe Text
    merchantKey: Maybe Text
    paytmTid: Maybe Text
    isActive: Maybe Bool
    derive: "'HideSecrets"

apis:
  - POST:
      endpoint: /assign
      name: AssignEDCMachine
      auth: ApiAuthV2
      request:
        type: AssignEDCMachineReq
      response:
        type: AssignEDCMachineResp

  - GET:
      endpoint: /list
      name: ListEDCMachine
      auth: ApiAuthV2
      query:
        personId: Id Person
        isActive: Bool
      response:
        type: EDCMachineMappingListResp

  - PUT:
      endpoint: /{mappingId}/update
      name: UpdateEDCMachine
      auth: ApiAuthV2
      params:
        mappingId: Id EDCMachineMapping
      request:
        type: UpdateEDCMachineReq
      response:
        type: APISuccess

  - DELETE:
      endpoint: /{mappingId}/delete
      name: DeleteEDCMachine
      auth: ApiAuthV2
      params:
        mappingId: Id EDCMachineMapping
      response:
        type: APISuccess
