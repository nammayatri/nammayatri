imports:
  PassDetails: Domain.Types.PassDetails
  PassOrganization: Domain.Types.PassOrganization
  VerificationStatus: Domain.Types.PassDetails
  RoutePair: Domain.Types.PassDetails
  PassDetailAddress: Domain.Types.PassDetails
  Person: Domain.Types.Person
  MediaFile: IssueManagement.Domain.Types.MediaFile
  UTCTime: Data.Time
  Day: Data.Time
  APISuccess: Kernel.Types.APISuccess
  PassEnum: Domain.Types.PassType
  Gender: Domain.Types.Person

importPackageOverrides:
  Domain.Types.Person: "rider-app"
  Domain.Types.PassDetails: "rider-app"
  Domain.Types.PassOrganization: "rider-app"
  Domain.Types.PassType: "rider-app"

module: PassOrganization

types:
  PassDetailsInfoResp:
    passDetailsId: Id PassDetails
    personId: Id Person
    name: Text
    idCardPicture: "Maybe (Id MediaFile)"
    verificationStatus: VerificationStatus
    validTill: UTCTime
    address: "Maybe PassDetailAddress"
    gender: Gender
    pincode: Maybe Text
    selfImage: Id MediaFile
    routePairs: "[RoutePair]"
    age: Maybe Int
    guardianName: Maybe Text
    guardianMobileNumber: Maybe Text
    department: Maybe Text
    year: Maybe Text
    academicYearStart: Maybe Day
    academicYearEnd: Maybe Day
    numberOfStages: Maybe Int
    remark: Maybe Text
    organizationName: Text
    createdAt: UTCTime
    updatedAt: UTCTime

  PassDetailsListResp:
    passDetails: "[PassDetailsInfoResp]"
    limit: Int
    offset: Int

  PassDetailsVerification:
    passDetailsId: Id PassDetails
    academicYearStart: Maybe Day
    academicYearEnd: Maybe Day
    numberOfStages: Maybe Int
    verificationStatus: VerificationStatus
    remark: Maybe Text

  VerifyPassDetailsReq:
    verifications: "[PassDetailsVerification]"
    derive: "'HideSecrets"

  PassOrganizationUpdateReq:
    name: Text
    address: Maybe Text
    passEnum: PassEnum
    derive: "'HideSecrets"

  GetOrganizationResp:
    id: Id PassOrganization
    name: Text
    address: Maybe Text
    depotId: Maybe Text

  DepotAssign:
    id: Id PassOrganization
    isAdd: Bool

  AssignDepotReq:
    depotPersonId: Id Person
    depotId: Maybe Text
    passOrganizations: "[DepotAssign]"
    derive: "'HideSecrets"

apis:
  - GET:
      endpoint: /getPassOrganization/{personId}
      auth: ApiAuthV2
      params:
        personId: Id Person
      response:
        type: GetOrganizationResp
  - GET:
      endpoint: /passDetails/{passEnum}
      auth: ApiAuthV2
      params:
        passEnum: Text
      query:
        - passOrganizationId: Id PassOrganization
        - status: Text
        - limit: Int
        - offset: Int
      response:
        type: PassDetailsListResp
  - GET:
      endpoint: /passDetails/depot/
      auth: ApiAuthV2
      query:
        - limit: Int
        - offset: Int
      mandatoryQuery:
        - depotPersonId: Id Person
        - status: Text
      response:
        type: PassDetailsListResp
  - POST:
      endpoint: /passDetails/verify
      auth: ApiAuthV2
      request:
        type: VerifyPassDetailsReq
      response:
        type: APISuccess
  - POST:
      endpoint: /update/{personId}
      auth: ApiAuthV2
      params:
        personId: Id Person
      request:
        type: PassOrganizationUpdateReq
      response:
        type: APISuccess
  - GET:
      endpoint: /getOrganizations/{passEnum}
      auth: ApiAuthV2
      params:
        passEnum: Text
      query:
        - depotPersonId: Id Person
      response:
        type: "[GetOrganizationResp]"
  - GET:
      endpoint: /passDetails/document/{documentId}
      auth: ApiAuthV2
      params:
        documentId: Id MediaFile
      response:
        type: Text
  - POST:
      endpoint: /assignDepot
      auth: ApiAuthV2
      request:
        type: AssignDepotReq
      response:
        type: APISuccess
