imports:
  Text: Data.Text
  Maybe: Data.Maybe
  APISuccess: Kernel.Types.APISuccess
  SeatLayout: Domain.Types.SeatLayout
  Seat: Domain.Types.Seat
  SeatType: Domain.Types.Seat

importPackageOverrides:
  Domain.Types.SeatLayout: "rider-app"
  Domain.Types.Seat: "rider-app"

module: SeatLayout
apiPrefix: seatLayout

types:
  SeatDef:
    id: Maybe (Id Seat)
    row: Maybe Int
    col: Maybe Int
    label: Maybe Text
    seatType: Maybe SeatType
    isBookable: Maybe Bool
    isLadiesOnly: Maybe Bool
    directionDegrees: Maybe Int
    minStopsRequired: Maybe Int

  SeatLayoutUpsertReq:
    seatLayoutId: Id SeatLayout
    name: Maybe Text
    rows: Maybe Int
    columns: Maybe Int
    seatsToCreate: "[SeatDef]"
    seatsToUpdate: "[SeatDef]"
    seatsToDelete: "[Id Seat]"
    derive: "'HideSecrets"

  SeatLayoutDetailResp:
    id: Id SeatLayout
    name: Text
    rows: Int
    columns: Int
    seats: "[Seat]"

apis:
  - POST:
      endpoint: /upsert
      name: UpsertSeatLayout
      auth: ApiAuthV2
      request:
        type: SeatLayoutUpsertReq
      response:
        type: APISuccess

  - GET:
      endpoint: /list
      name: ListSeatLayout
      auth: ApiAuthV2
      query:
        limit: Int
        offset: Int
      response:
        type: "[SeatLayout]"

  - GET:
      endpoint: /{seatLayoutId}
      name: GetSeatLayout
      auth: ApiAuthV2
      params:
        seatLayoutId: Id SeatLayout
      response:
        type: SeatLayoutDetailResp

  - DELETE:
      endpoint: /{seatLayoutId}/delete
      name: DeleteSeatLayout
      auth: ApiAuthV2
      params:
        seatLayoutId: Id SeatLayout
      response:
        type: APISuccess
