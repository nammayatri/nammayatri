name: dashboard-repl-check
version: 0.1.0.0
github: "nammayatri/nammayatri"
license: AllRightsReserved
author: "nammayatri"
maintainer: "nammayatri"
copyright: "2023 Juspay Technologies Private Limited"

description: Thin package whose sole purpose is to pull in both rider-dashboard and provider-dashboard so a single cabal repl covers the entire dashboard dep tree.

ghc-options:
  - -Wall
  - -Wcompat
  - -Werror
  - -Widentities
  - -Wunused-imports
  - -fwrite-ide-info
  - -hiedir=.hie

library:
  dependencies:
    - rider-dashboard
    - provider-dashboard
