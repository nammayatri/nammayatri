imports:
  Vehicle: Domain.Types.Vehicle

VehicleInspection:
  tableName: vehicle_inspection
  fields:
    id: Id VehicleInspection
    vehicleId: Id Vehicle
    questionName: Text
    question: Text
    answer: Text
  constraints:
    id: PrimaryKey
  queries:
    findById:
      kvFunction: findOneWithKV
      where: id
    findAllByVehicleId:
      kvFunction: findAllWithKV
      where: vehicleId
    findByVehicleIdAndQuestionName:
      kvFunction: findOneWithKV
      where:
        and: [vehicleId, questionName]
