imports:
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  Person: Domain.Types.Person
  PenaltyRule: Domain.Types.PenaltyRule

DriverGracePeriodTracker:
  tableName: driver_grace_period_tracker

  fields:
    id: Id DriverGracePeriodTracker
    driverId: Id Person
    ruleId: Id PenaltyRule
    merchantId: Id Merchant
    merchantOperatingCityId: Id MerchantOperatingCity
    offenseCount: Int
    windowStartTime: UTCTime
    windowEndTime: UTCTime
    createdAt: UTCTime
    updatedAt: UTCTime

  derives: "Generic, Show, Eq"

  constraints:
    id: PrimaryKey
    driverId: "!SecondaryKey"
    ruleId: SecondaryKey

  default:
    offenseCount: "0"

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id

    findByDriverIdAndRuleId:
      kvFunction: findOneWithKV
      where:
        and: [driverId, ruleId]

    findAllByDriverId:
      kvFunction: findAllWithKV
      where: driverId

    updateOffenseCountById:
      kvFunction: updateOneWithKV
      params: [offenseCount, updatedAt]
      where: id

    updateWindowById:
      kvFunction: updateOneWithKV
      params: [offenseCount, windowStartTime, windowEndTime, updatedAt]
      where: id

  extraOperations:
    - EXTRA_QUERY_FILE
