imports:
  KnowledgeCenter: Domain.Types.KnowledgeCenter
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  FileType: AWS.S3.Types
  UTCTime: Kernel.Prelude

KnowledgeCenter:
  tableName: knowledge_center
  fields:
    id: Id KnowledgeCenter
    fileType: FileType
    sopType: Text
    documentName: Maybe Text
    merchantOperatingCityId: Id MerchantOperatingCity
    s3Path: Text
    createdAt: UTCTime
    updatedAt: UTCTime
    merchantId: Maybe (Id Merchant)
  constraints:
    id: PrimaryKey
    sopType: SecondaryKey
  queries:
    findById:
      kvFunction: findOneWithKV
      where: id
    findAllBySopType:
      kvFunction: findAllWithOptionsKV
      where: sopType
      orderBy:
        field: createdAt
        order: desc
    findAllBySopTypeAndMerchantOperatingCityId:
      kvFunction: findAllWithOptionsKV
      where:
        and: [sopType, merchantOperatingCityId]
      orderBy:
        field: createdAt
        order: desc
    deleteById:
      kvFunction: deleteWithKV
      where: id
    deleteBySopType:
      kvFunction: deleteWithKV
      where: sopType
    deleteBySopTypeAndMerchantOperatingCityId:
      kvFunction: deleteWithKV
      where:
        and: [sopType, merchantOperatingCityId]
