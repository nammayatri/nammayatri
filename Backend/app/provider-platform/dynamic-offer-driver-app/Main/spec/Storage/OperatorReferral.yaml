imports:
  Person: Domain.Types.Person
  Ride: Domain.Types.Ride
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  UTCTime: Kernel.Prelude
  Text: Data.Text
  Money: Kernel.Types.Common

OperatorReferral:
  tableName: operator_referral

  fields:
    referralCode : Id OperatorReferral
    operatorId : Text
    linkedAt : UTCTime

  constraints:
    referralCode: PrimaryKey
    operatorId: SecondaryKey

  queries:
    findByReferralCode:
      kvFunction: findOneWithKV
      where: referralCode

    findById:
      kvFunction: findOneWithKV
      where: operatorId

  extraOperations:
    - EXTRA_QUERY_FILE
