imports:
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  UTCTime: Kernel.Prelude
  Text: Data.Text
  Language: Kernel.External.Types
  Value: Data.Aeson
  Merchant: Domain.Types.Merchant
  DeviceType: Kernel.Types.Version
  PlatformType: Lib.Yudhishthira.Types




UiDriverConfig:
  tableName: ui_driver_config
  derives: "Generic,Show,ToJSON,FromJSON,Eq,ToSchema"

  fields:
    id : Id UiDriverConfig
    merchantOperatingCityId : Id MerchantOperatingCity
    os: DeviceType
    platform: PlatformType
    config : Value
    createdAt : UTCTime
    updatedAt : UTCTime

  constraints:
    id: PrimaryKey
  sqlType:
    config: json

  excludedFields: [merchantId, merchantOperatingCityId]

  queries:
    findAllByMerchantOpCityId:
      kvFunction: findAllWithKV
      where: merchantOperatingCityId

  extraOperations:
    - EXTRA_QUERY_FILE

  configPilot:
    configType: UiDriverConfig
    fetchQuery: findAllByMerchantOpCityId
    returnType: List
    queryModule: Storage.Queries.UiDriverConfig
    filterDimensions:
      - os
      - platform