imports:
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  Person: Domain.Types.Person
  VehicleCategory: Domain.Types.VehicleCategory

DriverOperatorAssociation:
  tableName: driver_operator_association

  fields:
    id: Id DriverOperatorAssociation
    operatorId: Text
    isActive: Bool
    driverId: Id Person
    associatedOn: Maybe UTCTime
    associatedTill: Maybe UTCTime
    onboardingVehicleCategory: Maybe VehicleCategory

  constraints:
    id: PrimaryKey
    operatorId: SecondaryKey
    driverId: SecondaryKey

  queries:
    findAllOperatorByDriverId:
      kvFunction: findAllWithKV
      where: driverId

    deleteByOperatorId:
      kvFunction: deleteWithKV
      where: operatorId

    # # do we need cached queries?
    # findByfleetOperatorIdAndFleetOwnerId:
    #   kvFunction: findOneWithKV
    #   where:
    #     and: [operatorId, fleetOwnerId, enabled]

  sqlType:
    id: text
    operatorId: text
    driverId: text

  extraOperations:
    - EXTRA_QUERY_FILE

  excludedFields: [merchantOperatingCityId, merchantId]