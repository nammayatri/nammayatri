imports:
  VehicleRegistrationCertificate: Domain.Types.VehicleRegistrationCertificate

VehicleInfo:
  tableName: vehicle_info
  fields:
    id: Id VehicleInfo
    rcId: Id VehicleRegistrationCertificate
    questionName: Text
    question: Text
    answer: Text
  constraints:
    id: PrimaryKey
  queries:
    findAllByVehicleId:
      kvFunction: findAllWithKV
      where: rcId
    updateVehicleInfo:
      kvFunction: updateWithKV
      params: [questionName, question, answer]
      where: id
