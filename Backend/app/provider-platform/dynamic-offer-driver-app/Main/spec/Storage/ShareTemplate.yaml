imports:
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity

ShareTemplate:
  tableName: share_template

  fields:
    id: Id ShareTemplate
    templateType: Text
    name: Text
    backgroundImageUrl: Text
    textOverlayConfig: Text
    isActive: Bool
    merchantId: Id Merchant
    merchantOperatingCityId: Maybe (Id MerchantOperatingCity)
    createdAt: UTCTime
    updatedAt: UTCTime

  default:
    isActive: "true"

  constraints:
    id: PrimaryKey

  queries:
    findByTemplateTypeAndMerchantId:
      kvFunction: findAllWithKV
      where:
        and: [templateType, merchantId, isActive]

    findById:
      kvFunction: findOneWithKV
      where: id

    findAllByMerchantId:
      kvFunction: findAllWithKV
      where: merchantId

    updateIsActive:
      kvFunction: updateOneWithKV
      params: [isActive, updatedAt]
      where: id

  sqlType:
    id: character varying(36)
    templateType: character varying(30)
    name: text
    backgroundImageUrl: text
    textOverlayConfig: text
    isActive: boolean
    merchantId: character varying(36)
    merchantOperatingCityId: character varying(36)
    createdAt: timestamp with time zone
    updatedAt: timestamp with time zone
