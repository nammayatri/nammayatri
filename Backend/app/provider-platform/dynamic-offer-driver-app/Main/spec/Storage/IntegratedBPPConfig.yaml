imports:
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  VehicleCategory: BecknV2.FRFS.Enums
  City: Kernel.Types.Beckn.Context
  Seconds: Kernel.Types.Time
  BaseUrl: Kernel.Prelude

IntegratedBPPConfig:
  tableName: integrated_bpp_config
  derives: "Generic,Show,ToJSON,FromJSON"

  fields:
    id: Id IntegratedBPPConfig
    agencyKey: Text
    feedKey: Text
    domain: Text
    providerConfig: ProviderConfig
    city: Maybe City
    merchantOperatingCityId: Id MerchantOperatingCity
    merchantId: Id Merchant
    vehicleCategory: Maybe Text
    platformType: PlatformType

  beamFields:
    providerConfig:
      configJSON: Data.Aeson.Value

  defaults:
    vehicleCategory: "'BUS'"
    platformType: "'APPLICATION'"
    feedKey: "'UNKNOWN'"
    agencyKey: "'UNKNOWN'"
    city: "NULL"

  types:
    PlatformType:
      enum: "MULTIMODAL, PARTNERORG, APPLICATION"
      derive': "Show, Eq, Ord, Read, Generic, ToJSON, FromJSON, ToSchema, ToParamSchema"
    ProviderConfig:
      enum: "DIRECT DIRECTConfig, ONDC ONDCBecknConfig"
      derive': "Generic, FromJSON, ToJSON, Eq, Show"
    DIRECTConfig:
      cipherKey: Text
      qrRefreshTtl: Maybe Seconds
      baseUrl: Maybe BaseUrl
      derive': "Generic, FromJSON, ToJSON, Eq, Show"
    ONDCBecknConfig:
      networkHostUrl: Maybe BaseUrl
      networkId: Maybe Text
      multiInitAllowed: Maybe Bool
      fareCachingAllowed: Maybe Bool
      singleTicketForMultiplePassengers: Maybe Bool
      overrideCity: Maybe City
      redisPrefix: Maybe Text
      derive': "Generic, FromJSON, ToJSON, Eq, Show"

  domainInstance:
    - Custom Kernel.Utils.TH.mkFromHttpInstanceForEnum <PlatformType>
    - Custom Kernel.Utils.TH.mkToHttpInstanceForEnum <PlatformType>
    - Custom Kernel.Beam.Lib.UtilsTH.mkBeamInstancesForEnumAndList <PlatformType>

  fromTType:
    providerConfig: Storage.Queries.Transformers.IntegratedBPPConfig.getProviderConfig configJSON|EM

  toTType:
    configJSON: Storage.Queries.Transformers.IntegratedBPPConfig.getProviderConfigJson providerConfig|E

  sqlType:
    configJSON: json
    platformType: text

  constraints:
    id: PrimaryKey
    agencyKey: SecondaryKey

  extraIndexes:
    - columns: [agencyKey]
      unique: false
    - columns: [domain, city, vehicleCategory, platformType]
      unique: false

  extraOperations:
    - GENERATE_INDEXES

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id
    findByAgencyId:
      kvFunction: findOneWithKV
      where:
        and: [agencyKey]
    findByDomainAndCityAndVehicleCategory:
      kvFunction: findAllWithKV
      where:
        and: [domain, city, vehicleCategory, platformType]
    findByDomainAndCityAndVehicleCategoryAnyPlatform:
      kvFunction: findAllWithKV
      where:
        and: [domain, city, vehicleCategory]
    findAllByPlatformAndVehicleCategory:
      kvFunction: findAllWithKV
      where:
        and: [domain, vehicleCategory, platformType]
