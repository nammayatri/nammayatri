imports:
  Person: Domain.Types.Person
  Ride: Domain.Types.Ride
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  UTCTime: Kernel.Prelude
  Text: Data.Text
  Money: Kernel.Types.Common

FleetReferral:
  tableName: fleet_referral

  fields:
    referralCode : Id FleetReferral
    fleetOwnerId : Text
    linkedAt : UTCTime

  constraints:
    referralCode: PrimaryKey
    fleetOwnerId: SecondaryKey

  queries:
    findByReferralCode:
      kvFunction: findOneWithKV
      where: referralCode

    findById:
      kvFunction: findOneWithKV
      where: fleetOwnerId

  extraOperations:
    - EXTRA_QUERY_FILE
