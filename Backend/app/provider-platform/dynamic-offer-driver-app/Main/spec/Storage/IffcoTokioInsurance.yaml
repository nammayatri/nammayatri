imports:
  Person: Domain.Types.Person
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity

IffcoTokioInsurance:
  tableName: iffco_tokio_insurance

  types:
    IffcoTokioInsuranceStatus:
      enum: "PENDING, INSURED, FAILED"
      derive': "Read, Show, Eq, Generic, FromJSON, ToJSON, ToSchema, ToParamSchema, Ord"

  fields:
    id: Id IffcoTokioInsurance
    driverId: Id Person
    merchantId: Id Merchant
    merchantOperatingCityId: Id MerchantOperatingCity
    invoiceRequestNumber: Text
    certificateNumber: Maybe Text
    declarationId: Maybe Text
    iffcoStatus: Maybe Text
    insuranceStatus: IffcoTokioInsuranceStatus
    createdAt: UTCTime
    updatedAt: UTCTime

  derives: "Generic, Show, Eq"

  domainInstance:
    - Custom Kernel.Beam.Lib.UtilsTH.mkBeamInstancesForEnumAndList <IffcoTokioInsuranceStatus>

  constraints:
    id: PrimaryKey
    invoiceRequestNumber: "!SecondaryKey"
    driverId: "!SecondaryKey"

  default:
    insuranceStatus: "'PENDING'"

  sqlType:
    insuranceStatus: character varying(255)

  queries:
    findByInvoiceRequestNumber:
      kvFunction: findOneWithKV
      where: invoiceRequestNumber

    findAllByDriverId:
      kvFunction: findAllWithKV
      where: driverId

  extraOperations:
    - EXTRA_QUERY_FILE
