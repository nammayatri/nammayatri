imports:
  Id: Kernel.Types.Id
  UTCTime: Data.Time
  HighPrecMoney: Kernel.Types.Common
  InvoiceType: Lib.Finance.Domain.Types.Invoice
  Value: Data.Aeson

module: FinanceInvoice
types:
  FinanceInvoiceItem:
    invoiceNumber: Text
    invoiceType: InvoiceType
    invoiceDate: UTCTime
    taxAmount: HighPrecMoney
    taxableValue: HighPrecMoney
    totalAmountPayable: HighPrecMoney
    gstRate: Maybe Double
    cgstRate: Maybe Double
    sgstRate: Maybe Double
    igstRate: Maybe Double
    sgstAmount: Maybe HighPrecMoney
    cgstAmount: Maybe HighPrecMoney
    igstAmount: Maybe HighPrecMoney
    totalGstAmount: Maybe HighPrecMoney
    paymentMethod: Maybe Text
    issuedToName: Maybe Text
    issuedToAddress: Maybe Text
    issuedByName: Maybe Text
    issuedByAddress: Maybe Text
    supplierAddress: Maybe Text
    supplierName: Maybe Text
    supplierGSTIN: Maybe Text
    supplierTaxNo: Maybe Text
    gstinOfParty: Maybe Text
    sacCode: Maybe Text
    lineItems: Maybe Value
    totalCredit: Maybe HighPrecMoney
    taxRate: Maybe Double
    issuedToTaxNo: Maybe Text
    issuedByTaxNo: Maybe Text
    cardLastFourDigits: Maybe Text
  FinanceInvoiceListRes:
    invoices: "[FinanceInvoiceItem]"
    totalItems: Int
apis:
  - GET:
      endpoint: /subscription/invoices
      query:
        invoiceType: InvoiceType
        fromDate: UTCTime
        toDate: UTCTime
        limit: Int
        offset: Int
      auth: TokenAuth PROVIDER_TYPE
      response:
        type: FinanceInvoiceListRes
