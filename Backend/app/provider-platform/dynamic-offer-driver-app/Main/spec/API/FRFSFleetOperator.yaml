imports:
  Text: Data.Text
  LatLong: Kernel.External.Maps.Types
  City: Kernel.Types.Beckn.Context
  VehicleCategory: BecknV2.FRFS.Enums
  TimeBound: Kernel.Types.TimeBound
  FleetOperatorTripAction: Domain.Types.FleetOperatorTripAction

module: FRFSFleetOperator

types:
  FRFSStationAPI:
    name: Maybe Text
    code: Text
    routeCodes: Maybe [Text]
    lat: Maybe Double
    lon: Maybe Double
    timeTakenToTravelUpcomingStop: Maybe Seconds
    address: Maybe Text
    stationType: Maybe Text
    color: Maybe Text
    distance: Maybe Meters
    sequenceNum: Maybe Int
    towards: Maybe Text
    integratedBppConfigId: Text
    parentStopCode: Maybe Text
    derive: "Show"

  FRFSRouteAPI:
    code: Text
    shortName: Text
    longName: Text
    startPoint: LatLong
    endPoint: LatLong
    totalStops: Maybe Int
    stops: Maybe [FRFSStationAPI]
    waypoints: Maybe [LatLong]
    timeBounds: Maybe TimeBound
    integratedBppConfigId: Text
    derive: "Show"

  OperatorTripInfo:
    tripNumber: Int
    routeId: Text
    routeNumber: Text
    routeName: Text
    isActiveTrip: Bool
    dutyDate: Maybe Text
    startTime: Maybe Text
    endTime: Maybe Text
    derive: "Show"

  FleetOperatorTripActionReq:
    action: FleetOperatorTripAction
    conductorToken: Maybe Text
    driverToken: Maybe Text
    vehicleNumber: Maybe Text
    derive: "Show"

  FleetOperatorTripActionResp:
    currentTripNumber: Int
    hasUpcomingTrips: Bool
    derive: "Show"

  FleetOperatorCurrentOperationReq:
    conductorToken: Maybe Text
    driverToken: Maybe Text
    vehicleNumber: Maybe Text
    derive: "Show"

  FleetOperatorCurrentOperationResp:
    waybillNo: Text
    vehicleNumber: Text
    gtfsId: Text
    conductorToken: Maybe Text
    driverToken: Maybe Text
    history: "[OperatorTripInfo]"
    current: Maybe OperatorTripInfo
    upcoming: "[OperatorTripInfo]"
    derive: "Show"

  PassengerInfo:
    personId: Text
    name: Text
    phone: Text
    bookingId: Text
    checkedIn: Bool
    derive: "Show"

  PassengerStopManifest:
    stopCode: Text
    stopName: Maybe Text
    boardingPassengers: "[PassengerInfo]"
    alightingPassengers: "[PassengerInfo]"
    derive: "Show"

  FRFSTripPassengerManifestResp:
    manifest: "[PassengerStopManifest]"
    derive: "Show"

apis:
  - GET:
      endpoint: /v2/frfs/route/{routeCode}
      auth: TokenAuth PROVIDER_TYPE
      mandatoryQuery:
        city: City
        vehicleType: VehicleCategory
      query:
        platformType: Text
        integratedBppConfigId: Text
      params:
        routeCode: Text
      response:
        type: FRFSRouteAPI

  - GET:
      endpoint: /v2/frfs/trip/{tripId}/route/{routeId}/manifest
      auth: TokenAuth PROVIDER_TYPE
      params:
        tripId: Text
        routeId: Text
      response:
        type: FRFSTripPassengerManifestResp

  - POST:
      endpoint: /frfs/fleetOperator/tripAction
      auth: TokenAuth PROVIDER_TYPE
      request:
        type: FleetOperatorTripActionReq
      response:
        type: FleetOperatorTripActionResp

  - POST:
      endpoint: /frfs/fleetOperator/currentOperation
      auth: TokenAuth PROVIDER_TYPE
      request:
        type: FleetOperatorCurrentOperationReq
      response:
        type: FleetOperatorCurrentOperationResp
