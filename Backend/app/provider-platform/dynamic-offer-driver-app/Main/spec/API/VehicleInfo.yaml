imports:
  APISuccess: Kernel.Types.APISuccess
  VehicleInfo: Domain.Types.VehicleInfo
  Text: Data.Text

module: VehicleInfo

apis:
  - GET:
      endpoint: /vehicleInfo/list
      auth: TokenAuth PROVIDER_TYPE
      response:
        type: "[VehicleInfo]"
  - PUT:
      endpoint: /vehicleInfo/update
      auth: TokenAuth PROVIDER_TYPE
      request:
        type: UpdateVehicleInfoReq
      response:
        type: APISuccess

types:
  UpdateVehicleInfoReq:
    - recordType: NewType
    - newInfo: "[VehicleInfo]"