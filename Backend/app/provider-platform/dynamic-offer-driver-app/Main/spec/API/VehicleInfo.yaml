imports:
  APISuccess: Kernel.Types.APISuccess
  VehicleInfo: Domain.Types.VehicleInfo
  Text: Data.Text

module: VehicleInfo

apis:
  - GET:
      endpoint: /vehicleInfo
      auth: TokenAuth PROVIDER_TYPE
      response:
        type: "[VehicleInfo]"
  - PUT:
      endpoint: /vehicleInfo
      auth: TokenAuth PROVIDER_TYPE
      request:
        type: UpdateVehicleInfosReq
      response:
        type: APISuccess

types:
  UpdateVehicleInfosReq:
    newInfo: "[VehicleInfo]"