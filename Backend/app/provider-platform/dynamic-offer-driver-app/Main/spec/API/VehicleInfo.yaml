imports:
  APISuccess: Kernel.Types.APISuccess
  VehicleInfo: Domain.Types.VehicleInfo
  VehicleRegistrationCertificate: Domain.Types.VehicleRegistrationCertificate

module: VehicleInfo

apis:
  - GET:
      endpoint: /vehicleInfo/{rcId}/list
      params:
        rcId: Id VehicleRegistrationCertificate
      auth: TokenAuth PROVIDER_TYPE
      response:
        type: "[VehicleInfo]"
  - POST:
      endpoint: /vehicleInfo/update
      auth: TokenAuth PROVIDER_TYPE
      request:
        type: UpdateVehicleInfoReq
      response:
        type: APISuccess

types:
  UpdateVehicleInfoReq:
    - recordType: NewType
    - newInfo: "[VehicleInfo]"