imports:
  LatLong: Kernel.External.Maps.Types
  TimeBound: Kernel.Types.TimeBound

module: LiveMap

apis:
  - GET:
      endpoint: /liveMap/drivers
      auth: TokenAuth PROVIDER_TYPE
      response:
        type: MapDriverInfoRes

types:
  MapDriverInfoRes:
    - driverName: Text
    - driverStatus: DriverStatus
    - rcNo: Text
    - vehicleStatus: VehicleStatus
    - position: LatLong
    - source: Text
    - destination: Text
    - routeDetails: RouteDetails
  DriverStatus:
    - enum: "TO_PICKUP, ON_TRIP, ONLINE, SILENT, OFFLINE"
  VehicleStatus:
    - enum: "Active, InActive, Valid, Invalid, Pending, OnRide, TripAssigned"
  RouteDetails:
    - code: Text
    - shortName: Text
    - longName: Text
    - startPoint: LatLong
    - endPoint: LatLong
    - stops: [StopInfo]
    - waypoints: Maybe [LatLong]
    - timeBounds: Maybe TimeBound
    - derive: "'HideSecrets"
  StopInfo:
    - name: Text
    - code: Text
    - point: LatLong
    - derive: "'HideSecrets"