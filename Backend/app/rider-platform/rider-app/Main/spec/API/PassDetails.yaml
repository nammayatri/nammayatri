imports:
  PassDetails: Domain.Types.PassDetails
  PassOrganization: Domain.Types.PassOrganization
  VerificationStatus: Domain.Types.PassDetails
  RoutePair: Domain.Types.PassDetails
  PassDetailAddress: Domain.Types.PassDetails
  Pass: Domain.Types.Pass
  UTCTime: Data.Time
  Day: Data.Time
  APISuccess: Kernel.Types.APISuccess
  Gender: Domain.Types.Person
  FilePath: EulerHS.Prelude
module: PassDetails

types:
  RouteDetails:
    srcStopName: Text
    srcStopId: Text
    destStopName: Text
    destStopId: Text

  PassDetailsUpdateReq:
    passOrganizationId: Id PassOrganization
    name: Text
    idCardPicture: Maybe Text
    address: "Maybe PassDetailAddress"
    age: Maybe Int
    gender: Gender
    pincode: Maybe Text
    selfImage: Text
    guardianName: Maybe Text
    guardianMobileNumber: Maybe Text
    department: Maybe Text
    year: Maybe Text
    routeDetails: "[RouteDetails]"
    registerNo: Maybe Text
    aadharNo: Maybe Text
    academicYearStart: Maybe Day
    academicYearEnd: Maybe Day

  PassDetailsDataResp:
    passDetailsId: Id PassDetails
    name: Text
    age: Maybe Int
    guardianName: Maybe Text
    guardianMobileNumber: Maybe Text
    address: "Maybe PassDetailAddress"
    department: Maybe Text
    year: Maybe Text
    idCardPicture: Maybe Text
    routePairs: "[RoutePair]"
    selfImage: Text
    gender: Gender
    pincode: Maybe Text
    passOrganizationId: Id PassOrganization
    passOrganizationName: Text
    registerNo: Maybe Text
    academicYearStart: Maybe Day
    academicYearEnd: Maybe Day
    verificationStatus: VerificationStatus
    validTill: UTCTime
    remark: Maybe Text


  PassStatusResp:
    verificationStatus: VerificationStatus
    validTill: UTCTime
    remark: Maybe Text

  GetOrganizationResp:
    id: Id PassOrganization
    name: Text
    address: Maybe Text

  UploadImageReq:
    file: FilePath

apis:
  - GET:
      endpoint: /getOrganizations/{passEnum}
      auth: TokenAuth
      params:
        passEnum: Text
      response:
        type: "[GetOrganizationResp]"
  - POST:
      endpoint: /passDetails/{passEnum}/update
      auth: TokenAuth
      params:
        passEnum: Text
      request:
        type: PassDetailsUpdateReq
      response:
        type: APISuccess
  - GET:
      endpoint: /passDetails/{passEnum}/data
      auth: TokenAuth
      params:
        passEnum: Text
      response:
        type: PassDetailsDataResp
  - GET:
      endpoint: /passDetails/{passEnum}/verificationStatus
      auth: TokenAuth
      params:
        passEnum: Text
      response:
        type: PassStatusResp
  - POST:
      endpoint: /passDetails/uploadImage
      auth: TokenAuth
      multipart:
        type: API.Types.UI.PassDetails.UploadImageReq
      response:
        type: Text
  - GET:
      endpoint: /passDetails/media
      auth: TokenAuth
      mandatoryQuery:
        filePath: Text
      response:
        type: Text