imports:
  Text: Data.Text
  UTCTime: Kernel.Prelude
  Merchant: Domain.Types.Merchant
  SvpJourneyStatus: Domain.Types.SvpJourney

module: SVP

types:

  GenerateQrResp:
    qrData: Text
    tktSlNo: Text
    validTill: UTCTime
    journeyStatus: Maybe SvpJourneyStatus

  ScanType:
    enum: "ENTRY,EXIT"
    derive': "Show, Eq, Ord, Read, Generic, ToJSON, FromJSON, ToSchema"

  GateCallbackReq:
    mobileNumber: Text
    merchantId: Id Merchant
    stationCode: Text
    timestamp: UTCTime
    scanType: ScanType

  GateCallbackResp:
    allowed: Bool
    reason: Maybe Text
    fareCharged: Maybe Double

  SignQRReq:
    plaintext: Text

  SignQRResp:
    signature: Text

apis:

  # Generate (or refresh) SVP QR for the authenticated rider
  - GET:
      endpoint: /svp/qr
      auth: TokenAuth
      query:
        lat: Double
        lon: Double
      response:
        type: GenerateQrResp

  # Public key endpoint — used by gate scanner to verify QR signatures
  - GET:
      endpoint: /svp/publicKey
      auth: NoAuth
      response:
        type: Text

  # AFC gate callback — called by CMRL AFC on QR scan
  - POST:
      endpoint: /svp/gate
      auth: NoAuth
      request:
        type: GateCallbackReq
      response:
        type: GateCallbackResp

  # Sign plaintext with the server RSA key — used by gate scanner test app
  - POST:
      endpoint: /svp/signQR
      auth: NoAuth
      request:
        type: SignQRReq
      response:
        type: SignQRResp
