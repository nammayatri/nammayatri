imports:
  LoyaltyProgramSummary: Lib.Payment.Wallet.Types
  Day: Data.Time.Calendar

module: Loyalty

types:
  DailySpend:
    date: Day
    amount: Int
    derive: "Show, Eq"

  LoyaltyInfoResp:
    programs: "[LoyaltyProgramSummary]"
    derive: "Show, Eq"

  MonthlyExpenseResp:
    last30DaysSpend: "[DailySpend]"
    derive: "Show, Eq"

apis:
  - POST:
      endpoint: /wallet/loyaltyInfo
      auth: TokenAuth
      response:
        type: LoyaltyInfoResp

  - POST:
      endpoint: /rider/monthlyExpense
      auth: TokenAuth
      response:
        type: MonthlyExpenseResp
