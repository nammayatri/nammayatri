imports:
  LoyaltyInfoRequest: Kernel.External.Wallet.Interface.Types
  LoyaltyInfoResponse: Kernel.External.Wallet.Interface.Types
  APISuccess: Kernel.Types.APISuccess

module: Loyalty

types:
  SvpDeductReq:
    customerId: Text
    amount: HighPrecMoney

apis:
  - POST:
      endpoint: /wallet/loyaltyInfo
      auth: TokenAuth
      response:
        type: LoyaltyInfoResponse

  - POST:
      endpoint: /wallet/svp/deduct
      auth: TokenAuth
      request:
        type: SvpDeductReq
      response:
        type: APISuccess
