imports:
  Text: Data.Text
  Person: Domain.Types.Person
  Ride: Domain.Types.Ride
  UTCTime: Kernel.Prelude
  APISuccess: Kernel.Types.APISuccess
  HighPrecMeters: Kernel.Types.Common
  HighPrecMoney: Kernel.Types.Common
  InvoiceType: Lib.Finance.Domain.Types.Invoice
  InvoiceStatus: Lib.Finance.Domain.Types.Invoice
  Value: Data.Aeson

module: Invoice
types:
  InvoiceRes:
    date: UTCTime
    rideStartTime: UTCTime
    rideEndTime: UTCTime
    totalAmount: Text
    shortRideId: Text
    driverName: Text
    vehicleNumber: Text
    source: Text
    destination: Text
    faresList: "[FareBreakup]"
    chargeableDistance: Maybe HighPrecMeters
    chargeableDistanceWithUnit: Maybe Distance

  FareBreakup:
    title: Text
    price: Text

  FinanceInvoiceItem:
    invoiceNumber: Text
    invoiceType: InvoiceType
    invoiceStatus: InvoiceStatus
    invoiceDate: UTCTime
    totalAmount: HighPrecMoney
    subtotal: HighPrecMoney
    taxAmount: HighPrecMoney
    lineItems: Maybe Value
    issuedToName: Maybe Text
    issuedToAddress: Maybe Text
    issuedByName: Maybe Text
    issuedByAddress: Maybe Text
    taxRate: Maybe Double
    issuedToTaxNo: Maybe Text
    issuedByTaxNo: Maybe Text
  FinanceInvoiceListRes:
    invoices: "[FinanceInvoiceItem]"
    totalItems: Int

apis:
  # GET /invoice
  - GET:
      endpoint: /invoice
      auth: TokenAuth
      mandatoryQuery:
        from: UTCTime
        to: UTCTime
      response:
        type: "[API.Types.UI.Invoice.InvoiceRes]"
  # GET /invoice/list — finance-kernel invoices (Ride, RideCancellation)
  - GET:
      endpoint: /invoice/list
      auth: TokenAuth
      query:
        invoiceType: InvoiceType
        referenceId: Text
        limit: Int
        offset: Int
      response:
        type: FinanceInvoiceListRes