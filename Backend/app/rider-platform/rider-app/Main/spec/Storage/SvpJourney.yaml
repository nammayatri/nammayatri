imports:
  UTCTime: Kernel.Prelude
  HighPrecMoney: Kernel.Types.Common
  Currency: Kernel.Types.Common
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  Person: Domain.Types.Person

SvpJourney:
  tableName: svp_journey

  types:
    SvpJourneyStatus:
      enum: "ENTERED,EXITED,TIMED_OUT"
      derive': "Show, Eq, Ord, Read, Generic, ToJSON, FromJSON, ToSchema, Kernel.Prelude.ToParamSchema"

  domainInstance:
    - Custom Kernel.Beam.Lib.UtilsTH.mkBeamInstancesForEnum <SvpJourneyStatus>
    - Custom Kernel.Utils.TH.mkFromHttpInstanceForEnum <SvpJourneyStatus>
    - Custom Kernel.Utils.TH.mkToHttpInstanceForEnum <SvpJourneyStatus>

  fields:
    id: Id SvpJourney
    riderId: Id Person
    tktSlNo: Text
    status: SvpJourneyStatus
    entryStationCode: Maybe Text
    entryTime: Maybe UTCTime
    exitStationCode: Maybe Text
    exitTime: Maybe UTCTime
    fareCharged: Maybe HighPrecMoney
    currency: Maybe Currency
    merchantId: Id Merchant
    merchantOperatingCityId: Id MerchantOperatingCity
    createdAt: UTCTime
    updatedAt: UTCTime

  constraints:
    id: PrimaryKey
    riderId: "!SecondaryKey"

  queries:
    findById:
      kvFunction: findOneWithKV
      where: id
    findByRiderIdAndStatus:
      kvFunction: findOneWithKV
      where:
        and: [riderId, status]
    updateStatusAndExitDetailsById:
      kvFunction: updateWithKV
      params: [status, exitStationCode, exitTime, fareCharged, currency, updatedAt]
      where: id

  extraOperations:
    - EXTRA_QUERY_FILE
