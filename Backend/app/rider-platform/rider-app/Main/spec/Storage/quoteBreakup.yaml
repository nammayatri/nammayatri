imports:
  Merchant: Domain.Types.Merchant
  MerchantOperatingCity: Domain.Types.MerchantOperatingCity
  HighPrecMoney: Kernel.Types.Common
  Currency: Kernel.Types.Common
  Price: Kernel.Types.Common

QuoteBreakup:
  derives: "Show"

  fields:
    id: Id QuoteBreakup
    quoteId: Text
    title: Text
    price: Price

  beamFields:
    price:
      priceValue: HighPrecMoney
      priceCurrency: Maybe Currency

  toTType:
    priceValue: ((.amount) price)|E
    priceCurrency: (Just $ (.currency) price)|E

  fromTType:
    price: Kernel.Types.Common.mkPrice priceCurrency priceValue|E

  queries:
    findAllByQuoteIdT:
      kvFunction: findAllWithKVAndConditionalDB
      where: quoteId

  excludedDefaultQueries:
    - findByPrimaryKey
    - updateByPrimaryKey
    # The quote_breakup table is no longer written from the search path; breakups
    # now ride inline in quote.quote_breakup_list_json. The findAllByQuoteIdT
    # query below is kept so legacy rows can still be read as a fallback by
    # Storage.Queries.Transformers.Quote.loadQuoteBreakupList.
    - create
    - createMany

  constraints:
    id: PrimaryKey
    quoteId: SecondaryKey

  sqlType:
    priceCurrency: character varying(255)