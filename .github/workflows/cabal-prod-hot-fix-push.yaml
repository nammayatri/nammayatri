name: Cabal CI (Prod Hot Fix Push)

on:
  push:
    branches:
      - "prodHotPush-Common"
      - "prodHotPush-BAP"
      - "prodHotPush-BPP"
      - "prodHotPush-International"
      - "fix/revert-build-flags-bap" # temp: remove after testing
  workflow_dispatch:

# Cancel in-progress Pull Request workflows if a new workflow is triggered, or a new commit is pushed to the branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: read
  packages: write

jobs:
  check-conditions:
    runs-on: ubuntu-latest
    outputs:
      should-proceed: ${{ steps.evaluate.outputs.should_proceed }}
      should-push-docker: ${{ steps.check-docker-push.outputs.should_push_docker }}
    steps:
      - name: Apply labels
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: actions/labeler@v4
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check global conditions
        id: evaluate
        run: |
          # Check if workflow should proceed (non-matrix conditions)
          if [[ "${{ github.event.pull_request.merged }}" == "true" ||
                "${{ github.event_name }}" != "pull_request" ||
                "${{ github.event.action }}" != "closed" ]]; then
            echo "should_proceed=true" >> $GITHUB_OUTPUT
          else
            echo "should_proceed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check docker push conditions
        id: check-docker-push
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/prodHotPush-Common" ||
                "${{ github.ref }}" == "refs/heads/prodHotPush-MMFRFS" ||
                "${{ github.ref }}" == "refs/heads/prodHotPush-BAP" ||
                "${{ github.ref }}" == "refs/heads/prodHotPush-BPP" ||
                "${{ github.ref }}" == "refs/heads/prodHotPush-International" ||
                "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "should_push_docker=true" >> $GITHUB_OUTPUT
          else
            echo "should_push_docker=false" >> $GITHUB_OUTPUT
          fi

  cabal-build:
    name: ${{ matrix.name }}
    needs: [check-conditions]
    continue-on-error: ${{ matrix.continue-on-error }}
    if: needs.check-conditions.outputs.should-proceed == 'true'
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            arch: amd64
            name: Cabal Incremental Prod Release Build
            continue-on-error: false
      fail-fast: false
    runs-on: ${{ startsWith(github.ref_name, 'prodHotPush-') && format('x86_64_{0}_push', github.ref_name) || 'x86_64_prodHotPush-BAP_push' }}
    outputs:
      docker-image-name: ${{ steps.docker.outputs.base_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: |
          KEY=$(cat flake.lock Backend/cabal.project | sha256sum | cut -c1-16)
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Restore cabal cache
        run: |
          CACHE_ROOT=$HOME/ny-cabal-prod-cache/${RUNNER_NAME}/${{ github.ref_name }}
          KEY_FILE="$CACHE_ROOT/.cache-key-prod"
          CURRENT_KEY="${{ steps.cache-key.outputs.key }}"

          if [ -f "$KEY_FILE" ] && [ "$(cat $KEY_FILE)" != "$CURRENT_KEY" ]; then
            echo "Cache key changed, busting dist-newstyle, cabal store and HIE caches"
            rm -rf "$CACHE_ROOT/dist-newstyle"
            rm -rf "$CACHE_ROOT/.cabal-dir"
            rm -rf "$CACHE_ROOT/hie"
          fi

          mkdir -p "$CACHE_ROOT/dist-newstyle" "$CACHE_ROOT/.cabal-dir"
          echo "$CURRENT_KEY" > "$KEY_FILE"

          # Copy persistent cache into workspace instead of symlinking.
          # This means a mid-build cancellation only corrupts the workspace copy;
          # the persistent cache stays at the last known-good state and is only
          # updated after a successful build (see "Save cabal cache" step below).
          WORKSPACE_DIST="$GITHUB_WORKSPACE/Backend/dist-newstyle"
          mkdir -p "$WORKSPACE_DIST"
          echo "Copying dist-newstyle from persistent cache to workspace..."
          cp -r --reflink=auto "$CACHE_ROOT/dist-newstyle/." "$WORKSPACE_DIST/" 2>/dev/null || \
            cp -r "$CACHE_ROOT/dist-newstyle/." "$WORKSPACE_DIST/" 2>/dev/null || true
          echo "Copy done: $(du -sh $WORKSPACE_DIST 2>/dev/null || echo 'empty')"

      - name: Restore HIE cache
        run: |
          CACHE_ROOT=$HOME/ny-cabal-prod-cache/${RUNNER_NAME}/${{ github.ref_name }}
          HIE_CACHE="$CACHE_ROOT/hie"
          cd "$GITHUB_WORKSPACE/Backend"
          # Copy HIE files from persistent cache into workspace (same pattern as dist-newstyle:
          # workspace copy can be corrupted by cancellation; persistent cache only updated on success).
          grep -E '^[[:space:]]+(app|lib|test)' cabal.project | awk '{print $1}' | while read -r pkg; do
            [ -d "$pkg" ] || continue
            mkdir -p "$pkg/.hie"
            if [ -d "$HIE_CACHE/$pkg" ]; then
              cp -r --reflink=auto "$HIE_CACHE/$pkg/." "$pkg/.hie/" 2>/dev/null || \
                cp -r "$HIE_CACHE/$pkg/." "$pkg/.hie/" 2>/dev/null || true
            fi
          done
          echo "Restored HIE dirs from $HIE_CACHE"

      - name: Cache diagnostics
        run: |
          echo "RUNNER_NAME      = $RUNNER_NAME"
          echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          echo "pwd              = $(pwd)"
          CACHE_ROOT=$HOME/ny-cabal-prod-cache/${RUNNER_NAME}/${{ github.ref_name }}
          echo "cache dir        = $CACHE_ROOT"
          echo "dist-newstyle size at START:"; du -sh "$CACHE_ROOT/dist-newstyle" 2>/dev/null || echo "  (absent/empty)"
          echo "build dirs already present:"; ls "$CACHE_ROOT/dist-newstyle/build" 2>/dev/null | head || echo "  none"

      - name: Build (incremental cabal)
        run: |
          set -o pipefail
          nix develop .#backend --command bash -c "
            export CABAL_DIR=$HOME/ny-cabal-prod-cache/${RUNNER_NAME}/${{ github.ref_name }}/.cabal-dir
            cd Backend
            # Clear cabal store to prevent stale package registrations that
            # reference runner-local nix paths. Does not affect CI incrementality
            # (all packages come from GHC/nix, store is redundant).
            rm -rf \$CABAL_DIR/store
            mkdir -p \$CABAL_DIR/store/ghc-\$(ghc --numeric-version)
            ghc-pkg init \$CABAL_DIR/store/ghc-\$(ghc --numeric-version)/package.db 2>/dev/null || true
            echo \"GHC libdir: \$(ghc --print-libdir)\"
            echo '--- cabal dry-run (what it plans to rebuild) ---'
            cabal build all --flags=-Local --dry-run 2>&1 | tail -20
            echo '--- real build ---'
            cabal build all --flags=-Local 2>&1
          " | while IFS= read -r line; do
            printf '%s %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%S.%NZ')" "$line"
          done | tee prod-build-log.txt

      - name: Save cabal cache
        if: success()
        run: |
          CACHE_ROOT=$HOME/ny-cabal-prod-cache/${RUNNER_NAME}/${{ github.ref_name }}
          WORKSPACE_DIST="$GITHUB_WORKSPACE/Backend/dist-newstyle"
          echo "Syncing dist-newstyle back to persistent cache..."
          rsync -a --delete "$WORKSPACE_DIST/" "$CACHE_ROOT/dist-newstyle/"
          echo "Sync done: $(du -sh $CACHE_ROOT/dist-newstyle)"

          # Save HIE back to persistent cache
          HIE_CACHE="$CACHE_ROOT/hie"
          cd "$GITHUB_WORKSPACE/Backend"
          grep -E '^[[:space:]]+(app|lib|test)' cabal.project | awk '{print $1}' | while read -r pkg; do
            [ -d "$pkg/.hie" ] || continue
            mkdir -p "$HIE_CACHE/$pkg"
            rsync -a --delete "$pkg/.hie/" "$HIE_CACHE/$pkg/"
          done
          echo "HIE cache saved"

      - name: Collect binaries to staging
        run: |
          STAGING=$HOME/ny-staging/${{ github.run_id }}
          rm -rf "$STAGING"
          mkdir -p "$STAGING/bin" "$STAGING/opt/app"

          find Backend/dist-newstyle/build -type f | awk -F/ '$NF == $(NF-1) && !seen[$NF]++ {print}' | xargs -I{} cp {} "$STAGING/bin/"

          for f in "$STAGING/bin/"*; do
            ln -sf "../../bin/$(basename "$f")" "$STAGING/opt/app/$(basename "$f")"
          done

          cp -rT Backend/dhall-configs "$STAGING/opt/app/dhall-configs"
          cp -rT Backend/swagger "$STAGING/opt/app/swagger"

      - name: Upload prod build log
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: prod-build-log-${{ github.ref_name }}
          path: prod-build-log.txt
          retention-days: 1

      - name: Build And Push Docker image
        id: docker
        if: (matrix.system == 'x86_64-linux' || matrix.system == 'aarch64-linux') && needs.check-conditions.outputs.should-push-docker == 'true'
        env:
          DOCKER_REGISTRY: ghcr.io
        run: |
          export LOCAL_BINARIES_PATH=$HOME/ny-staging/${{ github.run_id }}
          nix build .#packages.${{ matrix.system }}.dockerImage --impure

          BASE_IMAGE="$(nix eval --raw .#packages.${{ matrix.system }}.dockerImage.imageName --impure):$(nix eval --raw .#packages.${{ matrix.system }}.dockerImage.imageTag --impure)"
          echo "base_image=${BASE_IMAGE}" >> $GITHUB_OUTPUT

          gunzip -c ./result > image.tar || cp ./result image.tar
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${DOCKER_REGISTRY} -u "${{ github.actor }}" --password-stdin
          # crane push image.tar "${DOCKER_REGISTRY}/${BASE_IMAGE}-${{ matrix.arch }}" use this for multi arch builds, not needed for now
          crane push image.tar "${DOCKER_REGISTRY}/${BASE_IMAGE}"
          crane auth logout ${DOCKER_REGISTRY}

      - name: Cleanup staging dir
        if: always()
        run: rm -rf $HOME/ny-staging/${{ github.run_id }}
