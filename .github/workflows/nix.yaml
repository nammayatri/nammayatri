name: Nix CI

on:
  push:
    branches: 
      - "main"
      - "backend/use-crane-to-push-docker-images"
      - "prodHotPush-Common"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: 
      - "main"
      - "backend/use-crane-to-push-docker-images"
      - "prodHotPush-Common"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read
  packages: write

jobs:
  check-conditions:
    runs-on: ubuntu-latest
    outputs:
      should-proceed: ${{ steps.evaluate.outputs.should_proceed }}
      has-backend: ${{ steps.check-labels.outputs.has_backend }}
      should-push-docker: ${{ steps.check-docker-push.outputs.should_push_docker }}
    steps:
      - name: Apply labels
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: actions/labeler@v4
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
      
      - name: Check global conditions
        id: evaluate
        run: |
          if [[ "${{ github.event.pull_request.merged }}" == "true" || 
                "${{ github.event_name }}" != "pull_request" || 
                "${{ github.event.action }}" != "closed" ]]; then
            echo "should_proceed=true" >> $GITHUB_OUTPUT
          else
            echo "should_proceed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check for backend label
        id: check-labels
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            sleep 5
            response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels")
            has_backend=$(echo "$response" | jq 'map(select(.name == "backend")) | length > 0')
          else
            has_backend=true
          fi
          echo "has_backend=${has_backend}" >> $GITHUB_OUTPUT
          echo "Label check result: ${has_backend}"

      - name: Check docker push conditions
        id: check-docker-push
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/backend/use-crane-to-push-docker-images" || 
                "${{ github.ref }}" == "refs/heads/prodHotPush-Common" || 
                "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "should_push_docker=true" >> $GITHUB_OUTPUT
          else
            echo "should_push_docker=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: [check-conditions]
    if: needs.check-conditions.outputs.should-proceed == 'true' && needs.check-conditions.outputs.has-backend == 'true'
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            host: x86_64-linux
          - system: aarch64-darwin
            host: aarch64-darwin
          - system: aarch64-linux
            host: aarch64-darwin
    runs-on: ${{ matrix.host }}
    steps:
      - name: Check matrix conditions
        id: check-conditions
        run: |
          if [[ "${{ matrix.system }}" == "aarch64-linux" && "${{ github.ref }}" != "refs/heads/backend/use-crane-to-push-docker-images" ]]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check-conditions.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/nix
          key: nixcache-${{ matrix.host }}-${{ matrix.system }}

      - name: Build all flake outputs
        if: steps.check-conditions.outputs.should_build == 'true'
        run: |
          om ci run --systems "${{ matrix.system }}" --no-out-link -- -v

      - name: Build Docker image
        id: docker
        if: steps.check-conditions.outputs.should_build == 'true' && (matrix.system == 'x86_64-linux' || matrix.system == 'aarch64-linux') && needs.check-conditions.outputs.should-push-docker == 'true'
        run: |
          # Build the Docker image
          nix build .#dockerImage --accept-flake-config
          
          # Get the image name from Nix evaluation
          echo "image_name=$(nix eval --raw .#dockerImage.imageName):$(nix eval --raw .#dockerImage.imageTag)-${{ matrix.system }}" >> $GITHUB_OUTPUT

      - name: Install crane
        if: steps.check-conditions.outputs.should_build == 'true' && (matrix.system == 'x86_64-linux' || matrix.system == 'aarch64-linux') && needs.check-conditions.outputs.should-push-docker == 'true'
        run: |
          mkdir -p $HOME/.local/bin
          curl -L "https://github.com/google/go-containerregistry/releases/download/v0.15.2/go-containerregistry_Linux_x86_64.tar.gz" | tar -xz -C $HOME/.local/bin crane
          chmod +x $HOME/.local/bin/crane
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Push Docker image with crane
        if: steps.check-conditions.outputs.should_build == 'true' && (matrix.system == 'x86_64-linux' || matrix.system == 'aarch64-linux') && needs.check-conditions.outputs.should-push-docker == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Direct gunzip
          gunzip -c result > image.tar
          
          echo "$GITHUB_TOKEN" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin
          crane push image.tar ${{ steps.docker.outputs.image_name }}
          crane auth logout ghcr.io
  # The previous job would have already built for macOS but we must do it again
  # from NixOS host (via remote builder protocol) so as to populate its local
  # Nix store, and thus provide macOS binaries as part of our Nix cache.

  macos-build-for-cache:
    runs-on: ${{ matrix.host }}
    needs: [build, check-conditions]
    if: github.ref == 'refs/heads/backend/use-crane-to-push-docker-images'
    strategy:
      matrix:
        system: [aarch64-darwin]
        host: [x86_64-linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build all flake outputs
        run: |
          om ci run --systems "${{ matrix.system }}" --no-out-link -- -v