name: Cabal PR Repl Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: cabal-pr-repl-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  repl-check:
    name: Incremental Repl Check
    runs-on: x86_64_main_pull
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Find merge base commit
        id: merge-base
        run: |
          git fetch origin main
          BASE_SHA=$(git merge-base origin/main ${{ github.event.pull_request.head.sha }})
          echo "sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "Merge base: $BASE_SHA"

      - name: Setup MinIO client
        run: |
          MINIO_ENDPOINT=$(jq -r '.minio_endpoint' /etc/service_discovery.json)
          MINIO_ACCESS_KEY=$(jq -r '.minio_access_key' /etc/service_discovery.json)
          MINIO_SECRET_KEY=$(jq -r '.minio_secret_key' /etc/service_discovery.json)
          mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

      - name: Check repl artifacts exist for merge base
        id: artifact-check
        run: |
          BASE_SHA="${{ steps.merge-base.outputs.sha }}"
          if mc stat "minio/haskell-cache/cabal-repl/$BASE_SHA/dynamic-offer-driver-app.tar.zst" > /dev/null 2>&1 && \
             mc stat "minio/haskell-cache/cabal-repl/$BASE_SHA/rider-app.tar.zst" > /dev/null 2>&1 && \
             mc stat "minio/haskell-cache/cabal-repl/$BASE_SHA/repl-support.tar.zst" > /dev/null 2>&1 && \
             mc stat "minio/haskell-cache/cabal-repl/$BASE_SHA/cache-root.txt" > /dev/null 2>&1 && \
             mc stat "minio/haskell-cache/cabal-build/$BASE_SHA/build-path.txt" > /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Artifacts found for $BASE_SHA"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::warning::No repl artifacts found for merge base $BASE_SHA — skipping incremental repl check"
          fi

      - name: Download repl artifacts from MinIO
        if: steps.artifact-check.outputs.found == 'true'
        run: |
          BASE_SHA="${{ steps.merge-base.outputs.sha }}"
          mkdir -p /tmp/ny-pr-artifacts

          mc cp "minio/haskell-cache/cabal-build/$BASE_SHA/build-path.txt"                   /tmp/ny-pr-artifacts/build-path.txt
          mc cp "minio/haskell-cache/cabal-repl/$BASE_SHA/cache-root.txt"                    /tmp/ny-pr-artifacts/cache-root.txt
          mc cp "minio/haskell-cache/cabal-repl/$BASE_SHA/dynamic-offer-driver-app.tar.zst"  /tmp/ny-pr-artifacts/driver.tar.zst
          mc cp "minio/haskell-cache/cabal-repl/$BASE_SHA/rider-app.tar.zst"                 /tmp/ny-pr-artifacts/rider.tar.zst
          mc cp "minio/haskell-cache/cabal-repl/$BASE_SHA/repl-support.tar.zst"              /tmp/ny-pr-artifacts/repl-support.tar.zst

          ORIGINAL_PATH=$(cat /tmp/ny-pr-artifacts/build-path.txt)
          ORIGINAL_CACHE_ROOT=$(cat /tmp/ny-pr-artifacts/cache-root.txt)
          echo "Original build path: $ORIGINAL_PATH"
          echo "Original cache root: $ORIGINAL_CACHE_ROOT"
          echo "original_path=$ORIGINAL_PATH" >> $GITHUB_ENV
          echo "original_cache_root=$ORIGINAL_CACHE_ROOT" >> $GITHUB_ENV

      - name: Extract repl artifacts
        if: steps.artifact-check.outputs.found == 'true'
        run: |
          PR_CACHE_ROOT=/tmp/ny-pr-cache-${{ github.run_id }}
          mkdir -p "$PR_CACHE_ROOT"
          echo "PR_CACHE_ROOT=$PR_CACHE_ROOT" >> $GITHUB_ENV

          tar -I 'zstd -T0' -xf /tmp/ny-pr-artifacts/driver.tar.zst       -C "$PR_CACHE_ROOT"
          tar -I 'zstd -T0' -xf /tmp/ny-pr-artifacts/rider.tar.zst        -C "$PR_CACHE_ROOT"
          tar -I 'zstd -T0' -xf /tmp/ny-pr-artifacts/repl-support.tar.zst -C "$PR_CACHE_ROOT"

          rm -f /tmp/ny-pr-artifacts/*.tar.zst

      - name: Repl check — dynamic-offer-driver-app
        if: steps.artifact-check.outputs.found == 'true'
        run: |
          CI_PROJECT_ROOT="$original_path"
          LOCAL_ROOT="$GITHUB_WORKSPACE"
          ORIGINAL_CABAL_DIR="$original_cache_root/.cabal-dir"
          ORIGINAL_DIST_DRIVER="$original_cache_root/dist-newrepl-driver"

          NIX_OVERLAY=""
          if [ -d "$PR_CACHE_ROOT/.nix-deps/nix/store" ]; then
            while IFS= read -r dep_file; do
              rel="${dep_file#$PR_CACHE_ROOT/.nix-deps}"
              if [ -f "$rel" ]; then
                NIX_OVERLAY="$NIX_OVERLAY mount --bind /tmp/ns-root/.nix-deps$rel $rel &&"
              fi
            done < <(find "$PR_CACHE_ROOT/.nix-deps/nix/store" -name "*.a" -type f 2>/dev/null)
          fi

          nix develop .#backend --command \
            unshare --user --mount --map-root-user bash -c "
              set -e
              mkdir -p /tmp/ns-root
              mount --bind $LOCAL_ROOT /tmp/ns-root
              mount -t tmpfs tmpfs /home
              mkdir -p $CI_PROJECT_ROOT
              mount --bind /tmp/ns-root $CI_PROJECT_ROOT
              mkdir -p $ORIGINAL_CABAL_DIR
              mount --bind $PR_CACHE_ROOT/.cabal-dir $ORIGINAL_CABAL_DIR
              mkdir -p $ORIGINAL_DIST_DRIVER
              mount --bind $PR_CACHE_ROOT/dist-newrepl-driver $ORIGINAL_DIST_DRIVER
              $NIX_OVERLAY true
              cd $CI_PROJECT_ROOT/Backend
              grep -E '^[[:space:]]+(app|lib|test)' cabal.project | awk '{print \$1}' | while read -r pkg; do
                [ -d \"\$pkg\" ] || continue
                rm -rf \"\$pkg/.hie\"
                ln -sfn \"$PR_CACHE_ROOT/hie/\$pkg\" \"\$pkg/.hie\"
              done
              export CABAL_DIR=$ORIGINAL_CABAL_DIR
              cabal repl dynamic-offer-driver-app \
                --repl-options='-fno-code -fwrite-interface' \
                --builddir=$ORIGINAL_DIST_DRIVER <<< ':quit'
            "

      - name: Repl check — rider-app
        if: steps.artifact-check.outputs.found == 'true'
        run: |
          CI_PROJECT_ROOT="$original_path"
          LOCAL_ROOT="$GITHUB_WORKSPACE"
          ORIGINAL_CABAL_DIR="$original_cache_root/.cabal-dir"
          ORIGINAL_DIST_RIDER="$original_cache_root/dist-newrepl-rider"

          NIX_OVERLAY=""
          if [ -d "$PR_CACHE_ROOT/.nix-deps/nix/store" ]; then
            while IFS= read -r dep_file; do
              rel="${dep_file#$PR_CACHE_ROOT/.nix-deps}"
              if [ -f "$rel" ]; then
                NIX_OVERLAY="$NIX_OVERLAY mount --bind /tmp/ns-root/.nix-deps$rel $rel &&"
              fi
            done < <(find "$PR_CACHE_ROOT/.nix-deps/nix/store" -name "*.a" -type f 2>/dev/null)
          fi

          nix develop .#backend --command \
            unshare --user --mount --map-root-user bash -c "
              set -e
              mkdir -p /tmp/ns-root
              mount --bind $LOCAL_ROOT /tmp/ns-root
              mount -t tmpfs tmpfs /home
              mkdir -p $CI_PROJECT_ROOT
              mount --bind /tmp/ns-root $CI_PROJECT_ROOT
              mkdir -p $ORIGINAL_CABAL_DIR
              mount --bind $PR_CACHE_ROOT/.cabal-dir $ORIGINAL_CABAL_DIR
              mkdir -p $ORIGINAL_DIST_RIDER
              mount --bind $PR_CACHE_ROOT/dist-newrepl-rider $ORIGINAL_DIST_RIDER
              $NIX_OVERLAY true
              cd $CI_PROJECT_ROOT/Backend
              grep -E '^[[:space:]]+(app|lib|test)' cabal.project | awk '{print \$1}' | while read -r pkg; do
                [ -d \"\$pkg\" ] || continue
                rm -rf \"\$pkg/.hie\"
                ln -sfn \"$PR_CACHE_ROOT/hie/\$pkg\" \"\$pkg/.hie\"
              done
              export CABAL_DIR=$ORIGINAL_CABAL_DIR
              cabal repl rider-app \
                --repl-options='-fno-code -fwrite-interface' \
                --builddir=$ORIGINAL_DIST_RIDER <<< ':quit'
            "

      - name: Cleanup
        if: always()
        run: rm -rf "$PR_CACHE_ROOT" /tmp/ny-pr-artifacts /tmp/ns-root
