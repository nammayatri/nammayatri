name: Cabal CI (Main Push)

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: cabal-build-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cabal-build:
    name: Dashboard Repl Artifact Build
    runs-on: x86_64_main_push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: |
          KEY=$(cat flake.lock Backend/cabal.project | sha256sum | cut -c1-16)
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Restore cabal cache
        run: |
          CACHE_ROOT=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/${{ github.ref_name }}
          KEY_FILE="$CACHE_ROOT/.cache-key-unoptimized"
          CURRENT_KEY="${{ steps.cache-key.outputs.key }}"

          if [ -f "$KEY_FILE" ] && [ "$(cat $KEY_FILE)" != "$CURRENT_KEY" ]; then
            echo "Cache key changed, busting cabal store, HIE and repl caches"
            rm -rf "$CACHE_ROOT/.cabal-dir"
            rm -rf "$CACHE_ROOT/hie"
            rm -rf "$CACHE_ROOT/dist-newrepl-rider-dashboard"
            rm -rf "$CACHE_ROOT/dist-newrepl-provider-dashboard"
          fi

          mkdir -p "$CACHE_ROOT/dist-newstyle" "$CACHE_ROOT/.cabal-dir" "$CACHE_ROOT/dist-newrepl-rider-dashboard" "$CACHE_ROOT/dist-newrepl-provider-dashboard"
          echo "$CURRENT_KEY" > "$KEY_FILE"
          ln -sfn "$CACHE_ROOT/dist-newstyle" Backend/dist-newstyle
          ln -sfn "$CACHE_ROOT/dist-newrepl-rider-dashboard" Backend/dist-newrepl-rider-dashboard
          ln -sfn "$CACHE_ROOT/dist-newrepl-provider-dashboard" Backend/dist-newrepl-provider-dashboard

      - name: Link HIE dirs to persistent cache
        run: |
          CACHE_ROOT=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/${{ github.ref_name }}
          HIE_CACHE="$CACHE_ROOT/hie"
          cd "$GITHUB_WORKSPACE/Backend"
          grep -E '^[[:space:]]+(app|lib|test)' cabal.project | awk '{print $1}' | while read -r pkg; do
            [ -d "$pkg" ] || continue
            mkdir -p "$HIE_CACHE/$pkg"
            rm -rf "$pkg/.hie"
            ln -sfn "$HIE_CACHE/$pkg" "$pkg/.hie"
          done

      - name: Build repl artifacts (rider-dashboard)
        run: |
          nix develop .#backend --command bash -c "
            export CABAL_DIR=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/${{ github.ref_name }}/.cabal-dir
            cd Backend
            cabal repl rider-dashboard \
              --repl-options='-fno-code -fwrite-interface' \
              --builddir=dist-newrepl-rider-dashboard <<< ':quit'
          "

      - name: Build repl artifacts (provider-dashboard)
        run: |
          nix develop .#backend --command bash -c "
            export CABAL_DIR=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/${{ github.ref_name }}/.cabal-dir
            cd Backend
            cabal repl provider-dashboard \
              --repl-options='-fno-code -fwrite-interface' \
              --builddir=dist-newrepl-provider-dashboard <<< ':quit'
          "

      - name: Setup MinIO client
        run: |
          MINIO_ENDPOINT=$(jq -r '.minio_endpoint' /etc/service_discovery.json)
          MINIO_ACCESS_KEY=$(jq -r '.minio_access_key' /etc/service_discovery.json)
          MINIO_SECRET_KEY=$(jq -r '.minio_secret_key' /etc/service_discovery.json)
          mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

      - name: Push repl artifacts to MinIO
        run: |
          CACHE_ROOT=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/${{ github.ref_name }}

          rm -rf "$CACHE_ROOT/.nix-deps"
          mkdir -p "$CACHE_ROOT/.nix-deps"
          cd "$CACHE_ROOT"
          for hi in $(find dist-newrepl-rider-dashboard -name "*.hi" -print -quit 2>/dev/null); do
            strings "$hi" | grep -oE '/nix/store/[^ ]+\.a$' | sort -u | while read -r dep; do
              if [ -f "$dep" ]; then
                rel="${dep#/}"
                mkdir -p ".nix-deps/$(dirname "$rel")"
                cp --no-preserve=mode,ownership "$dep" ".nix-deps/$rel"
              fi
            done
            break
          done
          cd -

          tar -I 'zstd -T0 -3' -cf rider-dashboard.tar.zst -C "$CACHE_ROOT" dist-newrepl-rider-dashboard/
          mc cp rider-dashboard.tar.zst "minio/haskell-cache/cabal-repl/${{ github.sha }}/rider-dashboard.tar.zst"
          rm -f rider-dashboard.tar.zst

          tar -I 'zstd -T0 -3' -cf provider-dashboard.tar.zst -C "$CACHE_ROOT" dist-newrepl-provider-dashboard/
          mc cp provider-dashboard.tar.zst "minio/haskell-cache/cabal-repl/${{ github.sha }}/provider-dashboard.tar.zst"
          rm -f provider-dashboard.tar.zst

          tar -I 'zstd -T0 -3' -cf repl-support.tar.zst -C "$CACHE_ROOT" --exclude='.cabal-dir/logs' hie/ .cabal-dir/ .nix-deps/
          mc cp repl-support.tar.zst "minio/haskell-cache/cabal-repl/${{ github.sha }}/repl-support.tar.zst"
          rm -f repl-support.tar.zst

          echo "$CACHE_ROOT" > cache-root.txt
          mc cp cache-root.txt "minio/haskell-cache/cabal-repl/${{ github.sha }}/cache-root.txt"
          rm -f cache-root.txt

          echo "$GITHUB_WORKSPACE" > build-path.txt
          mc cp build-path.txt "minio/haskell-cache/cabal-build/${{ github.sha }}/build-path.txt"
          rm -f build-path.txt

      - name: Mark commit as minio-pushed
        run: |
          git tag "minio-pushed/${{ github.sha }}"
          git push origin "minio-pushed/${{ github.sha }}"
