name: Cabal CI (PR Repl Check)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: cabal-repl-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  cabal-repl-check:
    name: Cabal Repl Check (driver + rider-app)
    runs-on: x86_64_main_pull
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MinIO client
        run: |
          MINIO_ENDPOINT=$(jq -r '.minio_endpoint' /etc/service_discovery.json)
          MINIO_ACCESS_KEY=$(jq -r '.minio_access_key' /etc/service_discovery.json)
          MINIO_SECRET_KEY=$(jq -r '.minio_secret_key' /etc/service_discovery.json)
          mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

      - name: Find nearest repl cache on main
        id: find-cache
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base HEAD origin/main)
          echo "Merge base: $MERGE_BASE"
          CACHE_SHA=""
          for SHA in $(git log --format='%H' "$MERGE_BASE" | head -30); do
            if mc stat "minio/haskell-cache/cabal-repl/$SHA/dynamic-offer-driver-app.tar.zst" > /dev/null 2>&1; then
              CACHE_SHA="$SHA"
              echo "Found repl cache at SHA: $CACHE_SHA"
              break
            fi
          done
          if [ -z "$CACHE_SHA" ]; then
            echo "No repl cache found in last 30 main commits — cannot run incremental repl check"
            exit 1
          fi
          echo "cache_sha=$CACHE_SHA" >> $GITHUB_OUTPUT

      - name: Restore repl cache — dynamic-offer-driver-app
        run: |
          CACHE_ROOT=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/main
          rm -rf "$CACHE_ROOT/dist-newrepl-driver"
          mkdir -p "$CACHE_ROOT"
          mc cp "minio/haskell-cache/cabal-repl/${{ steps.find-cache.outputs.cache_sha }}/dynamic-offer-driver-app.tar.zst" /tmp/driver-${{ github.run_id }}.tar.zst
          tar -I 'zstd -T0' -xf /tmp/driver-${{ github.run_id }}.tar.zst -C "$CACHE_ROOT"
          rm /tmp/driver-${{ github.run_id }}.tar.zst
          ln -sfn "$CACHE_ROOT/dist-newrepl-driver" Backend/dist-newrepl-driver

      - name: Restore repl cache — rider-app
        run: |
          CACHE_ROOT=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/main
          rm -rf "$CACHE_ROOT/dist-newrepl-rider"
          mc cp "minio/haskell-cache/cabal-repl/${{ steps.find-cache.outputs.cache_sha }}/rider-app.tar.zst" /tmp/rider-${{ github.run_id }}.tar.zst
          tar -I 'zstd -T0' -xf /tmp/rider-${{ github.run_id }}.tar.zst -C "$CACHE_ROOT"
          rm /tmp/rider-${{ github.run_id }}.tar.zst
          ln -sfn "$CACHE_ROOT/dist-newrepl-rider" Backend/dist-newrepl-rider

      - name: Restore cabal store from MinIO
        run: |
          CACHE_ROOT=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/main
          mkdir -p "$CACHE_ROOT/.cabal-dir"
          rm -rf "$CACHE_ROOT/.cabal-dir/store"
          mc cp "minio/haskell-cache/cabal-store/${{ steps.find-cache.outputs.cache_sha }}/cabal-store.tar.zst" /tmp/cabal-store-${{ github.run_id }}.tar.zst
          tar -I 'zstd -T0' -xf /tmp/cabal-store-${{ github.run_id }}.tar.zst -C "$CACHE_ROOT/.cabal-dir"
          rm /tmp/cabal-store-${{ github.run_id }}.tar.zst

      - name: Link HIE dirs to persistent cache
        run: |
          CACHE_ROOT=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/main
          HIE_CACHE="$CACHE_ROOT/hie"
          cd "$GITHUB_WORKSPACE/Backend"
          grep -E '^[[:space:]]+(app|lib|test)' cabal.project | awk '{print $1}' | while read -r pkg; do
            [ -d "$pkg" ] || continue
            mkdir -p "$HIE_CACHE/$pkg"
            rm -rf "$pkg/.hie"
            ln -sfn "$HIE_CACHE/$pkg" "$pkg/.hie"
          done

      - name: Cache diagnostics
        run: |
          CACHE_ROOT=$HOME/ny-cabal-unoptimized-cache/${RUNNER_NAME}/main
          echo "RUNNER_NAME  = $RUNNER_NAME"
          echo "cache_sha    = ${{ steps.find-cache.outputs.cache_sha }}"
          echo "dist-newrepl-driver size:"; du -sh "$CACHE_ROOT/dist-newrepl-driver" 2>/dev/null || echo "  (empty)"
          echo "dist-newrepl-rider size:";  du -sh "$CACHE_ROOT/dist-newrepl-rider"  2>/dev/null || echo "  (empty)"

      - name: Repl check — dynamic-offer-driver-app
        run: |
          set -o pipefail
          nix develop .#backend --command bash -c "
            export CABAL_DIR=\$HOME/ny-cabal-unoptimized-cache/\${RUNNER_NAME}/main/.cabal-dir
            cd Backend
            cabal repl dynamic-offer-driver-app \
              --repl-options='-fno-code -fwrite-interface' \
              --builddir=dist-newrepl-driver <<< ':quit'
          "

      - name: Repl check — rider-app
        run: |
          set -o pipefail
          nix develop .#backend --command bash -c "
            export CABAL_DIR=\$HOME/ny-cabal-unoptimized-cache/\${RUNNER_NAME}/main/.cabal-dir
            cd Backend
            cabal repl rider-app \
              --repl-options='-fno-code -fwrite-interface' \
              --builddir=dist-newrepl-rider <<< ':quit'
          "
