name: Nix CI (Prod Hot Fix Push)

on:
  push:
    branches:
      - "prodHotPush-Common"
      - "prodHotPush-BAP"
      - "prodHotPush-BPP"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read
  packages: write

jobs:
  check-conditions:
    runs-on: ubuntu-latest
    outputs:
      should-proceed: ${{ steps.evaluate.outputs.should_proceed }}      
      should-push-docker: ${{ steps.check-docker-push.outputs.should_push_docker }}
    steps:
      - name: Apply labels
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: actions/labeler@v4
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
      
      - name: Check global conditions
        id: evaluate
        run: |
          # Check if workflow should proceed (non-matrix conditions)
          if [[ "${{ github.event.pull_request.merged }}" == "true" || 
                "${{ github.event_name }}" != "pull_request" || 
                "${{ github.event.action }}" != "closed" ]]; then
            echo "should_proceed=true" >> $GITHUB_OUTPUT
          else
            echo "should_proceed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check docker push conditions
        id: check-docker-push
        run: |
          # Moving the docker push conditions here from the build job
          if [[ "${{ github.ref }}" == "refs/heads/prodHotPush-Common" ||
                "${{ github.ref }}" == "refs/heads/prodHotPush-MMFRFS" ||
                "${{ github.ref }}" == "refs/heads/prodHotPush-BAP" ||
                "${{ github.ref }}" == "refs/heads/prodHotPush-BPP" ||
                "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "should_push_docker=true" >> $GITHUB_OUTPUT
          else
            echo "should_push_docker=false" >> $GITHUB_OUTPUT
          fi
  nix-build:
    name: ${{ matrix.name }}
    needs: [check-conditions]
    continue-on-error: ${{ matrix.continue-on-error }}
    if: needs.check-conditions.outputs.should-proceed == 'true'
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            host: x86_64-linux-prod-hot-push
            arch: amd64
            name: Master Release Build
            continue-on-error: false
          # - system: aarch64-darwin
          #   host: aarch64-darwin
          #   name: Mac Cache Server
          #   continue-on-error: false
      fail-fast: false
    runs-on: ${{ matrix.host }}
    outputs:
      docker-image-name: ${{ steps.docker.outputs.base_image }}
    steps:
      - name: Check matrix conditions
        id: check-conditions
        run: |
          # Should build check (skip aarch64-linux on non-main)
          if [[ "${{ matrix.system }}" == "aarch64-linux" && "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
      - name: Checkout repository
        if: steps.check-conditions.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - name: Build all flake outputs
        if: steps.check-conditions.outputs.should_build == 'true'
        run: |
          set -o pipefail
          nix build github:srid/devour-flake#default --system ${{ matrix.system }} -L --print-out-paths --no-write-lock-file --override-input flake . --out-link ./result 2>&1 | while IFS= read -r line; do
            printf '%s %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%S.%NZ')" "$line"
          done | tee build-log.txt

      - name: Build And Push Docker image
        id: docker
        if: steps.check-conditions.outputs.should_build == 'true' && (matrix.system == 'x86_64-linux' || matrix.system == 'aarch64-linux') && needs.check-conditions.outputs.should-push-docker == 'true'
        env:
          DOCKER_REGISTRY: ghcr.io
        run: |
          nix build .#packages.${{ matrix.system }}.dockerImage --out-link ./docker-result

          BASE_IMAGE="$(nix eval --raw .#packages.${{ matrix.system }}.dockerImage.imageName):$(nix eval --raw .#packages.${{ matrix.system }}.dockerImage.imageTag)"
          echo "base_image=${BASE_IMAGE}" >> $GITHUB_OUTPUT

          gunzip -c ./docker-result > image.tar || cp ./docker-result image.tar
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${DOCKER_REGISTRY} -u "${{ github.actor }}" --password-stdin
          # crane push image.tar "${DOCKER_REGISTRY}/${BASE_IMAGE}-${{ matrix.arch }}" use this for multi arch builds, not needed for now
          crane push image.tar "${DOCKER_REGISTRY}/${BASE_IMAGE}"
          crane auth logout ${DOCKER_REGISTRY}
  
  cabal-build:
    name: ${{ matrix.name }}
    needs: [nix-build, check-conditions]
    continue-on-error: ${{ matrix.continue-on-error }}
    if: needs.check-conditions.outputs.should-proceed == 'true'
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            host: x86_64-linux-prod-hot-push
            arch: amd64
            name: Prod Release Build
            continue-on-error: false
      fail-fast: false
    runs-on: ${{ matrix.host }}
    outputs:
      docker-image-name: ${{ steps.docker.outputs.base_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: |
          KEY=$(cat flake.lock Backend/cabal.project | sha256sum | cut -c1-16)
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Restore cabal cache
        run: |
          CACHE_ROOT=$HOME/ny-cabal-cache/${RUNNER_NAME}
          KEY_FILE="$CACHE_ROOT/.cache-key-prod"
          CURRENT_KEY="${{ steps.cache-key.outputs.key }}"

          if [ -f "$KEY_FILE" ] && [ "$(cat $KEY_FILE)" != "$CURRENT_KEY" ]; then
            echo "Cache key changed, busting dist-newstyle-prod and cabal store"
            rm -rf "$CACHE_ROOT/dist-newstyle-prod"
            rm -rf "$CACHE_ROOT/.cabal-dir"
          fi

          mkdir -p "$CACHE_ROOT/dist-newstyle-prod" "$CACHE_ROOT/.cabal-dir"
          echo "$CURRENT_KEY" > "$KEY_FILE"
          ln -sfn "$CACHE_ROOT/dist-newstyle-prod" Backend/dist-newstyle

      - name: Build (incremental cabal)
        run: |
          set -o pipefail
          nix develop .#backend --command bash -c "
            export CABAL_DIR=$HOME/ny-cabal-cache/${RUNNER_NAME}/.cabal-dir
            cd Backend
            cabal build all -f-Local 2>&1
          " | while IFS= read -r line; do
            printf '%s %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%S.%NZ')" "$line"
          done | tee prod-build-log.txt

      - name: Collect binaries to staging
        run: |
          STAGING=$HOME/ny-staging/$GITHUB_RUN_ID
          rm -rf "$STAGING"
          mkdir -p "$STAGING/bin" "$STAGING/opt/app"

          find Backend/dist-newstyle/build -type f | awk -F/ '$NF == $(NF-1) && !seen[$NF]++ {print}' | xargs -I{} cp {} "$STAGING/bin/"

          for f in "$STAGING/bin/"*; do
            ln -sf "$f" "$STAGING/opt/app/$(basename "$f")"
          done

          cp -rT Backend/dhall-configs "$STAGING/opt/app/dhall-configs"
          cp -rT Backend/swagger "$STAGING/opt/app/swagger"

      - name: Build And Push Docker image
        id: docker
        if: matrix.system == 'x86_64-linux' || matrix.system == 'aarch64-linux'
        env:
          DOCKER_REGISTRY: ghcr.io
          DOCKER_TAG_PREFIX: "cabal-prod-"
        run: |
          export LOCAL_BINARIES_PATH=$HOME/ny-staging/${{ github.run_id }}
          nix build .#packages.${{ matrix.system }}.dockerImage --impure

          BASE_IMAGE="$(nix eval --raw .#packages.${{ matrix.system }}.dockerImage.imageName --impure):$(nix eval --raw .#packages.${{ matrix.system }}.dockerImage.imageTag --impure)"
          echo "base_image=${BASE_IMAGE}" >> $GITHUB_OUTPUT

          gunzip -c ./result > image.tar || cp ./result image.tar
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${DOCKER_REGISTRY} -u "${{ github.actor }}" --password-stdin
          crane push image.tar "${DOCKER_REGISTRY}/${BASE_IMAGE}"
          crane auth logout ${DOCKER_REGISTRY}

      - name: Cleanup staging dir
        if: always()
        run: rm -rf $HOME/ny-staging/${{ github.run_id }}